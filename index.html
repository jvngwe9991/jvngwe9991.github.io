<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EWINTH REVENGE | Ultra</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --accent: #9d4edd;
            --bg: #030303;
            --surface: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-dim: #b3b3b3;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; }

        #bg-blur { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; filter: blur(80px) brightness(0.2); z-index: -2; transition: 0.8s; }
        #bg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, transparent 0%, var(--bg) 95%); z-index: -1; }

        .navbar { height: 60px; display: flex; align-items: center; padding: 0 20px; position: fixed; top: 0; width: 100%; z-index: 100; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); }
        .nav-logo { font-weight: 900; color: var(--accent); letter-spacing: 2px; font-size: 14px; }

        .content { height: 100vh; overflow-y: auto; padding: 80px 20px 120px 20px; display: none; }
        .content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- PLAYER VIEW --- */
        .player-view { display: flex; flex-direction: column; align-items: center; text-align: center; }
        .album-art { width: 70vw; max-width: 260px; aspect-ratio: 1; border-radius: 30px; object-fit: cover; box-shadow: 0 20px 60px rgba(0,0,0,0.8); margin-bottom: 20px; }
        .viz-container { display: flex; justify-content: center; align-items: flex-end; gap: 4px; height: 35px; margin-bottom: 15px; }
        .viz-bar { width: 5px; background: var(--accent); border-radius: 3px; height: 4px; }

        .song-title { font-size: 22px; font-weight: 900; margin: 0; }
        .song-artist { color: var(--accent); font-weight: 700; margin: 5px 0 15px 0; font-size: 14px; }

        .controls { width: 100%; max-width: 380px; }
        .bar-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; cursor: pointer; margin-bottom: 8px; overflow: hidden; }
        .bar-fill { height: 100%; background: white; width: 0%; border-radius: 10px; }
        .times { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-dim); font-weight: 800; margin-bottom: 15px; }

        /* VOL HIDDEN */
        .vol-wrapper { margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; }
        .vol-trigger { background: var(--surface); border: none; color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .vol-trigger.active { background: var(--accent); transform: scale(0.9); }
        .vol-box { width: 100%; max-width: 250px; background: rgba(255,255,255,0.1); padding: 12px 20px; border-radius: 30px; margin-top: 10px; display: none; align-items: center; gap: 15px; }
        .vol-box.show { display: flex; animation: slideDown 0.3s ease; }
        .vol-slider { -webkit-appearance: none; flex: 1; height: 12px; background: rgba(255,255,255,0.1); border-radius: 10px; outline: none; overflow: hidden; }
        .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 0; box-shadow: -400px 0 0 400px white; }

        .main-btns { display: flex; align-items: center; justify-content: center; gap: 35px; margin-bottom: 25px; }
        .play-circle { width: 65px; height: 65px; background: white; color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        .panel { width: 100%; max-width: 400px; margin-top: 20px; padding: 20px; border-radius: 25px; background: var(--surface); display: none; }
        .panel.active { display: block; }
        .preset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; margin-bottom: 20px; }
        .pre-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 9px; padding: 10px 5px; border-radius: 12px; cursor: pointer; text-transform: uppercase; }
        .pre-btn.active { border-color: var(--accent); background: rgba(157, 78, 221, 0.2); }

        /* --- LIBRARY VIEW --- */
        .search-box { position: relative; margin-bottom: 20px; }
        .search-input { width: 100%; background: var(--surface); border: 1px solid rgba(255,255,255,0.05); padding: 12px 15px 12px 40px; border-radius: 15px; color: white; outline: none; }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-dim); }
        .view-controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .view-btn { background: var(--surface); border: none; color: var(--text-dim); padding: 8px 12px; border-radius: 10px; cursor: pointer; }
        .view-btn.active { background: var(--accent); color: white; }

        .grid-container { display: grid; gap: 15px; }
        .grid-container.grid-mode { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
        .grid-container.list-mode { grid-template-columns: 1fr; }
        
        .song-card { background: var(--surface); padding: 10px; border-radius: 15px; display: flex; flex-direction: column; align-items: center; transition: 0.2s; }
        .song-card img { width: 100%; aspect-ratio: 1; border-radius: 10px; object-fit: cover; }
        .song-card .info { margin-top: 10px; font-size: 11px; font-weight: 800; text-align: center; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .list-mode .song-card { flex-direction: row; align-items: center; gap: 15px; }
        .list-mode .song-card img { width: 50px; height: 50px; }
        .list-mode .song-card .info { text-align: left; font-size: 14px; }

        /* --- CONTACT --- */
        .contact-box { background: var(--surface); padding: 40px 20px; border-radius: 30px; text-align: center; border: 1px solid var(--accent); }
        .contact-link { display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); padding: 18px; border-radius: 20px; margin: 12px 0; text-decoration: none; color: white; font-weight: 700; }
        .contact-email { text-transform: lowercase; font-weight: 400; font-size: 14px; }

        /* --- NAVIGATION --- */
        .nav-bottom { height: 75px; display: flex; align-items: center; justify-content: space-around; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); position: fixed; bottom: 0; width: 100%; border-top: 1px solid rgba(255,255,255,0.05); z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-dim); cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .nav-item span { font-size: 10px; margin-top: 5px; font-weight: 800; }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="bg-blur"></div>
    <div id="bg-overlay"></div>

    <nav class="navbar"><div class="nav-logo">EWINTH REVENGE</div></nav>

    <div id="tab-home-content" class="content active">
        <div class="player-view">
            <img src="" id="p-img" class="album-art" onerror="this.src='https://via.placeholder.com/300/111/9d4edd?text=ER'">
            <div class="viz-container">
                <div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div>
            </div>
            <h1 class="song-title" id="p-title">Memuat...</h1>
            <p class="song-artist" id="p-artist">Ewinth Revenge</p>

            <div class="controls">
                <div class="bar-bg" id="seek-bar"><div class="bar-fill" id="bar-fill"></div></div>
                <div class="times"><span id="time-now">0:00</span><span id="time-total">0:00</span></div>
                
                <div class="vol-wrapper">
                    <button class="vol-trigger" id="vol-btn" onclick="toggleVolume()"><i data-lucide="volume-2" size="20"></i></button>
                    <div class="vol-box" id="vol-box">
                        <input type="range" class="vol-slider" min="0" max="1" step="0.01" value="1" oninput="audio.volume = this.value">
                    </div>
                </div>

                <div class="main-btns">
                    <i data-lucide="skip-back" onclick="prev()"></i>
                    <div class="play-circle" onclick="toggle()"><i data-lucide="play" id="play-icon" size="28"></i></div>
                    <i data-lucide="skip-forward" onclick="next()"></i>
                </div>

                <div style="display:flex; justify-content:center; gap:10px;">
                    <button class="view-btn active" onclick="togglePanel('lyrics')">LIRIK</button>
                    <button class="view-btn active" onclick="togglePanel('eq')">EQ PRO</button>
                </div>

                <div class="panel" id="eq-panel">
                    <div class="preset-grid" id="preset-render"></div>
                    <div class="eq-slider-box" style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                        <span style="font-size:10px; width:40px;">BASS</span>
                        <input type="range" id="eq-bass" class="vol-slider" min="0" max="2" step="0.1" value="1" oninput="setEQ('bass', this.value)">
                    </div>
                    <div class="eq-slider-box" style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                        <span style="font-size:10px; width:40px;">MID</span>
                        <input type="range" id="eq-mid" class="vol-slider" min="0" max="2" step="0.1" value="1" oninput="setEQ('mid', this.value)">
                    </div>
                    <div class="eq-slider-box" style="display:flex; align-items:center; gap:10px;">
                        <span style="font-size:10px; width:40px;">TREB</span>
                        <input type="range" id="eq-treble" class="vol-slider" min="0" max="2" step="0.1" value="1" oninput="setEQ('treble', this.value)">
                    </div>
                </div>
                <div class="panel" id="lyrics-panel"><div id="lyrics-content" style="font-size:13px; line-height:1.6; opacity:0.6;"></div></div>
            </div>
        </div>
    </div>

    <div id="tab-explore-content" class="content">
        <h2 style="margin: 0 0 20px 0;">LIBRARY</h2>
        <div class="search-box">
            <i data-lucide="search" size="18" class="search-icon"></i>
            <input type="text" class="search-input" id="search-input" placeholder="Cari judul lagu..." onkeyup="filterSongs()">
        </div>
        <div class="view-controls">
            <button class="view-btn active" id="grid-btn" onclick="setLibraryView('grid')"><i data-lucide="layout-grid" size="18"></i></button>
            <button class="view-btn" id="list-btn" onclick="setLibraryView('list')"><i data-lucide="list" size="18"></i></button>
        </div>
        <div id="library-render" class="grid-container grid-mode"></div>
    </div>

    <div id="tab-contact-content" class="content">
        <div class="contact-box">
            <h2 style="margin-bottom:30px;">HUBUNGI SAYA</h2>
            <a href="mailto:ceritasemalam001@gmail.com" class="contact-link"><i data-lucide="mail" style="margin-right:10px"></i><span class="contact-email">ceritasemalam001@gmail.com</span></a>
            <a href="https://wa.me/6283862722618" class="contact-link"><i data-lucide="message-circle" style="margin-right:10px"></i>0838 6272 2618</a>
            <p style="margin-top:40px; font-size:9px; font-weight:900; opacity:0.4; letter-spacing:2px;">EWINTH REVENGE © 2026</p>
        </div>
    </div>

    <div class="nav-bottom">
        <div class="nav-item active" onclick="switchTab('home')" id="nav-home"><i data-lucide="music"></i><span>PLAYER</span></div>
        <div class="nav-item" onclick="switchTab('explore')" id="nav-explore"><i data-lucide="layout-grid"></i><span>LIBRARY</span></div>
        <div class="nav-item" onclick="switchTab('contact')" id="nav-contact"><i data-lucide="mail"></i><span>KONTAK</span></div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const audio = document.getElementById('audio-player');
        let index = 0, vizInt, audioCtx, source, bassNode, midNode, trebleNode;
        let currentView = 'grid';

        const songs = [
            { title: "Left For Dead", artist: "Ewinth Revenge", file: "left for dead.mp3", img: "left for dead.jpeg", lirik: "Terjebak dalam sepi...\nWaktu perlahan berhenti..." },
            { title: "Takdir Memisahkan", artist: "Ewinth Revenge", file: "takdir memisahkan.mp3", img: "takdir memisahkan.jpeg", lirik: "Berjalan sendiri...\nMenelusuri jalan ini..." }
        ];

        const presets = { 'Normal': [1,1,1], 'Bass': [1.9,1.1,0.7], 'Rock': [1.6,0.8,1.5], 'Pop': [1,1.4,1.3], 'Vocal': [0.7,1.8,1.1] };

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            source = audioCtx.createMediaElementSource(audio);
            bassNode = audioCtx.createBiquadFilter(); bassNode.type = 'lowshelf'; bassNode.frequency.value = 250;
            midNode = audioCtx.createBiquadFilter(); midNode.type = 'peaking'; midNode.frequency.value = 1000;
            trebleNode = audioCtx.createBiquadFilter(); trebleNode.type = 'highshelf'; trebleNode.frequency.value = 4000;
            source.connect(bassNode); bassNode.connect(midNode); midNode.connect(trebleNode); trebleNode.connect(audioCtx.destination);
        }

        function setEQ(band, v) { initAudio(); let gain = (v - 1) * 20; if(band==='bass') bassNode.gain.value = gain; if(band==='mid') midNode.gain.value = gain; if(band==='treble') trebleNode.gain.value = gain; }
        
        function applyPre(name, btn) {
            document.querySelectorAll('.pre-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const [b, m, t] = presets[name];
            document.getElementById('eq-bass').value = b; document.getElementById('eq-mid').value = m; document.getElementById('eq-treble').value = t;
            setEQ('bass', b); setEQ('mid', m); setEQ('treble', t);
        }

        function toggleVolume() { 
            const box = document.getElementById('vol-box'), btn = document.getElementById('vol-btn');
            box.classList.toggle('show'); btn.classList.toggle('active');
        }

        function togglePanel(p) {
            const panel = document.getElementById(p + '-panel');
            const isActive = panel.classList.contains('active');
            document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
            if(!isActive) panel.classList.add('active');
        }

        function setLibraryView(v) {
            currentView = v;
            document.getElementById('grid-btn').classList.toggle('active', v==='grid');
            document.getElementById('list-btn').classList.toggle('active', v==='list');
            filterSongs();
        }

        function filterSongs() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const filtered = songs.filter(s => s.title.toLowerCase().includes(q));
            const container = document.getElementById('library-render');
            container.className = `grid-container ${currentView}-mode`;
            container.innerHTML = filtered.map(s => `
                <div class="song-card" onclick="playSong(${songs.indexOf(s)})">
                    <img src="${encodeURIComponent(s.img)}" onerror="this.src='https://via.placeholder.com/100/111/9d4edd?text=ER'">
                    <div class="info">${s.title}</div>
                </div>
            `).join('');
        }

        function playSong(i) { index = i; loadSong(i); audio.play(); updateUI(true); startViz(); switchTab('home'); }
        function loadSong(i) {
            const s = songs[i];
            audio.src = encodeURIComponent(s.file);
            document.getElementById('p-title').innerText = s.title;
            document.getElementById('p-artist').innerText = s.artist;
            document.getElementById('p-img').src = encodeURIComponent(s.img);
            document.getElementById('bg-blur').style.backgroundImage = `url('${encodeURIComponent(s.img)}')`;
            document.getElementById('lyrics-content').innerText = s.lirik;
        }

        function toggle() { initAudio(); if(audio.paused) { audio.play(); startViz(); updateUI(true); } else { audio.pause(); stopViz(); updateUI(false); } }
        function startViz() { clearInterval(vizInt); vizInt = setInterval(() => { document.querySelectorAll('.viz-bar').forEach(b => b.style.height = (Math.random()*30+5)+'px'); }, 100); }
        function stopViz() { clearInterval(vizInt); document.querySelectorAll('.viz-bar').forEach(b => b.style.height = '4px'); }
        function updateUI(p) { document.getElementById('play-icon').setAttribute('data-lucide', p?'pause':'play'); lucide.createIcons(); }

        function switchTab(t) { 
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`tab-${t}-content`).classList.add('active');
            document.getElementById(`nav-${t}`).classList.add('active');
        }

        function next() { index = (index + 1) % songs.length; playSong(index); }
        function prev() { index = (index - 1 + songs.length) % songs.length; playSong(index); }

        audio.ontimeupdate = () => { if(audio.duration) { 
            document.getElementById('bar-fill').style.width = (audio.currentTime/audio.duration)*100+"%"; 
            document.getElementById('time-now').innerText = fmt(audio.currentTime);
            document.getElementById('time-total').innerText = fmt(audio.duration);
        }};
        function fmt(s) { let m=Math.floor(s/60), sec=Math.floor(s%60); return m+":"+(sec<10?'0':'')+sec; }
        document.getElementById('seek-bar').onclick = (e) => audio.currentTime = (e.offsetX / e.currentTarget.offsetWidth) * audio.duration;

        document.getElementById('preset-render').innerHTML = Object.keys(presets).map(name => `<button class="pre-btn" onclick="applyPre('${name}', this)">${name}</button>`).join('');
        loadSong(0);
        filterSongs();
        lucide.createIcons();
    </script>
</body>
</html>
