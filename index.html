<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EWINTH REVENGE | Official Cloud Player</title>
    <script src="https://lucide.dev/icons/lucide.min.js"></script>
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-glow: rgba(212, 175, 55, 0.4);
            --bg-black: #050505;
            --panel-dark: #121212;
            --text-gray: #b3b3b3;
        }
        * { box-sizing: border-box; scrollbar-width: thin; scrollbar-color: var(--gold) #111; }
        body { 
            background: var(--bg-black); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* SIDEBAR */
        .sidebar { 
            width: 280px; 
            background: black; 
            padding: 20px 15px; 
            display: flex; 
            flex-direction: column; 
            border-right: 1px solid #1a1a1a; 
        }

        /* LOGO SECTION */
        .logo-section { text-align: center; margin-bottom: 30px; }
        .generated-logo {
            width: 80px; height: 80px;
            background: radial-gradient(circle, #222 0%, #000 100%);
            border-radius: 50%;
            border: 2px solid var(--gold);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 15px;
            box-shadow: 0 0 20px var(--gold-glow);
        }
        .logo-symbol { font-size: 35px; font-weight: 900; color: var(--gold); text-shadow: 0 0 10px var(--gold); }
        .logo-text { font-weight: 900; letter-spacing: 2px; color: var(--gold); font-size: 14px; text-transform: uppercase; }

        /* CONTACT AREA (SEBELAH KIRI BAWAH) */
        .sidebar-footer { margin-top: auto; padding-top: 20px; border-top: 1px solid #1a1a1a; }
        .contact-title { font-size: 10px; color: #555; letter-spacing: 1px; margin-bottom: 12px; text-transform: uppercase; }
        .contact-item { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            color: white; 
            font-size: 13px; 
            margin-bottom: 12px; 
            text-decoration: none; 
            transition: 0.2s;
            opacity: 0.8;
        }
        .contact-item:hover { color: var(--gold); opacity: 1; transform: translateX(5px); }
        .sync-badge { font-size: 10px; color: var(--gold); font-weight: bold; margin-top: 10px; }

        /* MAIN CONTENT */
        .main-view { flex: 1; background: linear-gradient(180deg, #181818 0%, #050505 100%); overflow-y: auto; padding: 40px; padding-bottom: 120px; }
        .header { display: flex; align-items: flex-end; gap: 30px; margin-bottom: 40px; }
        .playlist-art { width: 180px; height: 180px; background: #111; border-radius: 8px; border: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; }

        .tracklist { width: 100%; border-collapse: collapse; }
        .tracklist th { text-align: left; color: var(--text-gray); border-bottom: 1px solid #282828; padding: 12px; font-size: 11px; text-transform: uppercase; }
        .tracklist tr { transition: 0.2s; cursor: pointer; }
        .tracklist tr:hover { background: rgba(255,255,255,0.05); }
        .tracklist td { padding: 15px 12px; color: var(--text-gray); font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .tracklist tr.playing td { color: var(--gold); font-weight: bold; }

        /* PLAYER BAR (BOTTOM) */
        .player-bar { 
            position: fixed; bottom: 0; width: 100%; height: 95px; 
            background: #080808; border-top: 1px solid #1a1a1a; 
            display: flex; align-items: center; padding: 0 30px; justify-content: space-between; z-index: 100;
        }
        .info-song { display: flex; align-items: center; gap: 15px; width: 30%; }
        .mini-art { width: 50px; height: 50px; border-radius: 4px; border: 1px solid var(--gold); background: #000; display: flex; align-items: center; justify-content: center; }
        
        .player-controls { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
        .control-btns { display: flex; align-items: center; gap: 20px; }
        .btn-icon { background: none; border: none; color: var(--text-gray); cursor: pointer; transition: 0.2s; }
        .btn-icon:hover { color: var(--gold); }
        .play-btn { background: white; color: black; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        .progress-container { width: 100%; max-width: 500px; display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--text-gray); }
        .slider-base { flex: 1; height: 4px; background: #333; border-radius: 2px; position: relative; cursor: pointer; }
        .slider-fill { height: 100%; background: var(--gold); width: 0%; border-radius: 2px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-section">
            <div class="generated-logo"><div class="logo-symbol">ER</div></div>
            <div class="logo-text">EWINTH REVENGE</div>
        </div>

        <div style="color: var(--gold); font-size: 11px; font-weight: bold; letter-spacing: 1px; margin-bottom: 15px;">PLAYLIST</div>
        <div style="color: white; font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 10px;">
            <i data-lucide="list-music" size="18"></i> All Tracks
        </div>

        <div class="sidebar-footer">
            <div class="contact-title">Hubungi Kami</div>
            <a href="https://wa.me/6283862722618" target="_blank" class="contact-item">
                <i data-lucide="message-square" size="18" style="color: #25d366;"></i> 083862722618
            </a>
            <a href="mailto:ceritasemalam001@gmail.com" class="contact-item">
                <i data-lucide="mail" size="18" style="color: var(--gold);"></i> ceritasemalam001@gmail.com
            </a>
            <div id="sync-status" class="sync-badge">● MENGHUBUNGKAN...</div>
        </div>
    </div>

    <div class="main-view">
        <div class="header">
            <div class="playlist-art"><div class="logo-symbol" style="font-size: 70px;">ER</div></div>
            <div>
                <p style="font-size: 11px; font-weight: bold; color: var(--gold); letter-spacing: 2px;">AUTOMATIC SYNC</p>
                <h1 style="font-size: 45px; margin: 0; font-weight: 900; letter-spacing: -1px;">Ewinth Collection</h1>
                <p id="track-count" style="color: var(--text-gray); margin-top: 10px; font-size: 14px;">Memindai repository jvngwe9991.github.io...</p>
            </div>
        </div>

        <table class="tracklist">
            <thead>
                <tr><th style="width: 40px;">#</th><th>JUDUL LAGU</th><th>ARTIS</th><th style="text-align: right;">FORMAT</th></tr>
            </thead>
            <tbody id="list-lagu">
                </tbody>
        </table>
    </div>

    <div class="player-bar">
        <div class="info-song">
            <div class="mini-art"><div style="font-size: 18px; font-weight: 900; color: var(--gold);">ER</div></div>
            <div>
                <div id="p-title" style="font-weight: bold; font-size: 14px; color: white;">Pilih Lagu</div>
                <div id="p-artist" style="font-size: 11px; color: var(--text-gray);">Ewinth Revenge</div>
            </div>
        </div>

        <div class="player-controls">
            <div class="control-btns">
                <button class="btn-icon" onclick="prev()"><i data-lucide="skip-back" size="22"></i></button>
                <button class="btn-icon play-btn" onclick="toggle()"><i data-lucide="play" id="icon-play" size="20"></i></button>
                <button class="btn-icon" onclick="next()"><i data-lucide="skip-forward" size="22"></i></button>
            </div>
            <div class="progress-container">
                <span id="time-now">0:00</span>
                <div class="slider-base" id="prog-wrap">
                    <div class="slider-fill" id="prog-fill"></div>
                </div>
                <span id="time-total">0:00</span>
            </div>
        </div>
        <div style="width: 30%;"></div>
    </div>

    <audio id="player" crossorigin="anonymous"></audio>

    <script>
        lucide.createIcons();
        const USER = "jvngwe9991"; 
        const REPO = "jvngwe9991.github.io";
        const player = document.getElementById('player');
        let songs = [];
        let index = 0;

        async function sync() {
            try {
                const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/`);
                const data = await res.json();
                const mp3s = data.filter(f => f.name.toLowerCase().endsWith('.mp3'));
                
                songs = mp3s.map(f => ({
                    title: f.name.replace('.mp3', ''),
                    url: f.download_url
                }));

                if(songs.length > 0) {
                    render();
                    load(0);
                    document.getElementById('sync-status').innerHTML = "● TERKONEKSI KE CLOUD";
                    document.getElementById('track-count').innerText = `${songs.length} Track ditemukan di jvngwe9991.github.io.`;
                }
            } catch (e) { document.getElementById('sync-status').innerText = "● GAGAL SYNC"; }
        }

        function render() {
            const list = document.getElementById('list-lagu');
            list.innerHTML = songs.map((s, i) => `
                <tr id="tr-${i}" onclick="load(${i}); play();">
                    <td>${i+1}</td>
                    <td style="color:white; font-weight:600;">${s.title}</td>
                    <td>Ewinth Revenge</td>
                    <td style="text-align:right; font-family:monospace; color:var(--gold);">MP3</td>
                </tr>
            `).join('');
        }

        function load(i) {
            index = i;
            player.src = songs[i].url;
            document.getElementById('p-title').innerText = songs[i].title;
            document.querySelectorAll('tr').forEach(t => t.classList.remove('playing'));
            document.getElementById(`tr-${i}`).classList.add('playing');
        }

        function toggle() { player.paused ? play() : pause(); }
        function play() { player.play(); document.getElementById('icon-play').setAttribute('data-lucide', 'pause'); lucide.createIcons(); }
        function pause() { player.pause(); document.getElementById('icon-play').setAttribute('data-lucide', 'play'); lucide.createIcons(); }
        function next() { index = (index + 1) % songs.length; load(index); play(); }
        function prev() { index = (index - 1 + songs.length) % songs.length; load(index); play(); }

        player.ontimeupdate = () => {
            if(player.duration) {
                const p = (player.currentTime / player.duration) * 100;
                document.getElementById('prog-fill').style.width = p + "%";
                document.getElementById('time-now').innerText = format(player.currentTime);
                document.getElementById('time-total').innerText = format(player.duration);
            }
        };
        function format(s) { 
            let m = Math.floor(s/60); 
            let sec = Math.floor(s%60); 
            return `${m}:${sec < 10 ? '0' : ''}${sec}`; 
        }
        player.onended = next;
        sync();
    </script>
</body>
</html>
