<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EWINTH REVENGE MUSIC</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --accent: #9d4edd;
            --bg: #030303;
            --surface: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --text-dim: #b3b3b3;
        }

        * { box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; position: relative; }

        /* DYNAMIC BACKGROUND */
        #bg-blur {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            filter: blur(80px) brightness(0.3); z-index: -1; transition: 0.8s ease;
        }

        /* NAVIGATION TOP */
        .navbar {
            height: 60px; display: flex; align-items: center; padding: 0 20px;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            position: fixed; top: 0; width: 100%; z-index: 100;
        }
        .nav-logo { font-weight: 900; color: var(--accent); font-size: 16px; letter-spacing: 1px; text-transform: uppercase; }

        /* NAVIGATION BOTTOM */
        .nav-bottom {
            height: 70px; display: flex; align-items: center; justify-content: space-around;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
            position: fixed; bottom: 0; width: 100%; z-index: 100; border-top: 1px solid rgba(255,255,255,0.1);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; color: var(--text-dim); transition: 0.3s; }
        .nav-item.active { color: var(--accent); }
        .nav-item span { font-size: 10px; margin-top: 4px; font-weight: bold; }

        /* CONTENT AREA */
        .content { height: 100vh; overflow-y: auto; padding: 80px 20px 100px 20px; display: none; }
        .content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* TAB BERANDA (PLAYER) */
        .player-view { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; text-align: center; }
        .album-art { width: 85%; max-width: 320px; aspect-ratio: 1; border-radius: 12px; object-fit: cover; box-shadow: 0 10px 60px rgba(0,0,0,0.8); margin-bottom: 30px; }
        
        /* EQUALIZER */
        .eq { display: flex; gap: 4px; height: 25px; margin-bottom: 15px; align-items: flex-end; }
        .bar { width: 4px; background: var(--accent); border-radius: 2px; height: 4px; }
        .playing .bar { animation: wave 0.6s infinite alternate; }
        @keyframes wave { from { height: 4px; } to { height: 25px; } }

        .song-title { font-size: 24px; font-weight: 800; margin: 0; letter-spacing: -0.5px; }
        .song-artist { color: var(--accent); font-weight: 600; margin: 5px 0 30px 0; font-size: 16px; }

        /* CONTROLS */
        .controls { width: 100%; max-width: 400px; }
        .bar-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; cursor: pointer; position: relative; }
        .bar-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 2px; position: relative; }
        .bar-fill::after { content: ''; position: absolute; right: -5px; top: -4px; width: 12px; height: 12px; background: white; border-radius: 50%; }
        .times { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); margin-top: 10px; font-weight: bold; }

        .main-btns { display: flex; align-items: center; justify-content: center; gap: 40px; margin: 25px 0; }
        .play-circle { width: 65px; height: 65px; background: white; color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .play-circle:active { transform: scale(0.9); }

        /* TAB JELAJAHI */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: var(--surface); padding: 10px; border-radius: 12px; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); transition: 0.2s; }
        .card:active { transform: scale(0.95); }
        .card img { width: 100%; aspect-ratio: 1; border-radius: 8px; object-fit: cover; }
        .card-info { margin-top: 10px; font-size: 13px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* TAB KONTAK */
        .contact-box { background: var(--surface); padding: 40px 20px; border-radius: 24px; text-align: center; border: 1px solid rgba(157, 78, 221, 0.3); }
        .contact-box h2 { color: var(--accent); font-weight: 900; text-transform: uppercase; margin-top: 0; }
        .contact-link { display: block; margin: 25px 0; font-size: 16px; font-weight: 900; color: white; text-decoration: none; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; }
        .contact-link i { margin-right: 10px; color: var(--accent); vertical-align: middle; }

        .powered { font-size: 11px; font-weight: 900; color: var(--text-dim); margin-top: 60px; text-transform: uppercase; letter-spacing: 3px; opacity: 0.6; }

    </style>
</head>
<body id="body-player">

    <div id="bg-blur"></div>

    <nav class="navbar">
        <div class="nav-logo">EWINTH REVENGE music demo</div>
    </nav>

    <div id="tab-home-content" class="content active">
        <div class="player-view">
            <img src="" id="p-img" class="album-art" onerror="this.src='https://via.placeholder.com/300/333/9d4edd?text=ER'">
            
            <div class="eq">
                <div class="bar" style="animation-delay: 0.1s"></div>
                <div class="bar" style="animation-delay: 0.3s"></div>
                <div class="bar" style="animation-delay: 0.5s"></div>
                <div class="bar" style="animation-delay: 0.2s"></div>
            </div>

            <h1 class="song-title" id="p-title">Memuat Lagu...</h1>
            <p class="song-artist" id="p-artist">Ewinth Revenge</p>

            <div class="controls">
                <div class="progress-container">
                    <div class="bar-bg" id="seek-bar"><div class="bar-fill" id="bar-fill"></div></div>
                    <div class="times">
                        <span id="time-now">0:00</span>
                        <span id="time-total">0:00</span>
                    </div>
                </div>
                <div class="main-btns">
                    <i data-lucide="skip-back" onclick="prev()" style="cursor:pointer"></i>
                    <div class="play-circle" onclick="toggle()">
                        <i data-lucide="play" id="play-icon" size="30"></i>
                    </div>
                    <i data-lucide="skip-forward" onclick="next()" style="cursor:pointer"></i>
                </div>
                <div style="display:flex; align-items:center; gap:12px; justify-content:center; opacity:0.4">
                    <i data-lucide="volume-x" size="14"></i>
                    <input type="range" min="0" max="1" step="0.1" value="1" oninput="setVol(this.value)" style="accent-color:var(--accent); width:80px;">
                    <i data-lucide="volume-2" size="14"></i>
                </div>
            </div>
        </div>
    </div>

    <div id="tab-explore-content" class="content">
        <h2 style="font-weight: 900; margin-bottom: 25px; letter-spacing: -1px;">JELAJAHI</h2>
        <div class="grid" id="grid-render"></div>
    </div>

    <div id="tab-contact-content" class="content">
        <div class="contact-box">
            <h2>HUBUNGI SAYA</h2>
            <a href="mailto:CERITASEMALAM001@GMAIL.COM" class="contact-link">
                <i data-lucide="mail"></i> CERITASEMALAM001@GMAIL.COM
            </a>
            <a href="https://wa.me/6283862722618" class="contact-link">
                <i data-lucide="message-circle"></i> 083862722618
            </a>
            <div class="powered">POWERED BY EWINTH REVENGE</div>
        </div>
    </div>

    <div class="nav-bottom">
        <div class="nav-item active" onclick="switchTab('home')" id="nav-home">
            <i data-lucide="play"></i><span>BERANDA</span>
        </div>
        <div class="nav-item" onclick="switchTab('explore')" id="nav-explore">
            <i data-lucide="layout-grid"></i><span>JELAJAHI</span>
        </div>
        <div class="nav-item" onclick="switchTab('contact')" id="nav-contact">
            <i data-lucide="mail"></i><span>KONTAK</span>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const audio = document.getElementById('audio-player');
        let index = 0;

        // DATA LAGU
        const songs = [
            {
                title: "Left For Dead",
                artist: "Ewinth Revenge",
                file: "left for dead.mp3",
                img: "left for dead.jpeg"
            },
            {
                title: "Takdir Memisahkan",
                artist: "Ewinth Revenge",
                file: "takdir memisahkan.mp3",
                img: "takdir memisahkan.jpeg"
            }
        ];

        function switchTab(tab) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`tab-${tab}-content`).classList.add('active');
            document.getElementById(`nav-${tab}`).classList.add('active');
        }

        function loadSong(i) {
            index = i;
            const s = songs[i];
            audio.src = encodeURIComponent(s.file);
            document.getElementById('p-title').innerText = s.title;
            document.getElementById('p-artist').innerText = s.artist;
            document.getElementById('p-img').src = encodeURIComponent(s.img);
            document.getElementById('bg-blur').style.backgroundImage = `url('${encodeURIComponent(s.img)}')`;
        }

        function playSong(i) {
            loadSong(i);
            audio.play().catch(e => console.log("Interaksi user diperlukan"));
            updateUI(true);
            switchTab('home');
        }

        function toggle() {
            if (audio.paused) { audio.play(); updateUI(true); }
            else { audio.pause(); updateUI(false); }
        }

        function updateUI(isPlay) {
            const icon = document.getElementById('play-icon');
            icon.setAttribute('data-lucide', isPlay ? 'pause' : 'play');
            if(isPlay) document.getElementById('body-player').classList.add('playing');
            else document.getElementById('body-player').classList.remove('playing');
            lucide.createIcons();
        }

        function renderGrid() {
            document.getElementById('grid-render').innerHTML = songs.map((s, i) => `
                <div class="card" onclick="playSong(${i})">
                    <img src="${encodeURIComponent(s.img)}" onerror="this.src='https://via.placeholder.com/150/333/9d4edd?text=ER'">
                    <div class="card-info">${s.title}</div>
                </div>
            `).join('');
        }

        function next() { index = (index + 1) % songs.length; playSong(index); }
        function prev() { index = (index - 1 + songs.length) % songs.length; playSong(index); }
        function setVol(v) { audio.volume = v; }

        audio.ontimeupdate = () => {
            if(audio.duration) {
                const pos = (audio.currentTime / audio.duration) * 100;
                document.getElementById('bar-fill').style.width = pos + "%";
                document.getElementById('time-now').innerText = fmt(audio.currentTime);
                document.getElementById('time-total').innerText = fmt(audio.duration);
            }
        };

        function fmt(s) {
            let m = Math.floor(s/60), sec = Math.floor(s%60);
            return m + ":" + (sec < 10 ? '0' : '') + sec;
        }

        document.getElementById('seek-bar').onclick = (e) => {
            const p = e.offsetX / e.currentTarget.offsetWidth;
            audio.currentTime = p * audio.duration;
        };

        audio.onended = next;

        // Inisialisasi
        loadSong(0);
        renderGrid();
        lucide.createIcons();
    </script>
</body>
</html>
