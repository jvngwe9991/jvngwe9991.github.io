<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EWINTH REVENGE | YouTube Style</title>
    <script src="https://lucide.dev/icons/lucide.min.js"></script>
    <style>
        :root {
            --accent-purple: #9d4edd;
            --deep-purple: #3c096c;
            --bg-black: #030303;
            --panel-gray: #1a1a1a;
            --text-main: #ffffff;
            --text-dim: #aaaaaa;
        }

        * { box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }
        body { background: var(--bg-black); color: var(--text-main); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* HEADER NAV */
        .navbar {
            height: 64px;
            background: rgba(3, 3, 3, 0.95);
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
        }
        .nav-left { display: flex; align-items: center; gap: 20px; }
        .nav-logo { font-weight: 900; letter-spacing: -1px; font-size: 20px; color: var(--accent-purple); }
        .nav-center { display: flex; gap: 40px; font-weight: 500; }
        .nav-center span { cursor: pointer; color: var(--text-dim); transition: 0.3s; }
        .nav-center span:hover, .nav-center .active { color: white; }

        /* MAIN CONTENT */
        .main-view {
            margin-top: 64px;
            flex: 1;
            overflow-y: auto;
            padding: 40px 10%;
            background: radial-gradient(circle at top left, var(--deep-purple) 0%, transparent 40%);
        }

        .section-title { font-size: 24px; margin-bottom: 25px; font-weight: 700; }

        .song-list { display: flex; flex-direction: column; gap: 4px; }
        .song-item {
            display: grid;
            grid-template-columns: 50px 1fr 1fr 100px;
            align-items: center;
            padding: 8px 15px;
            border-radius: 4px;
            transition: background 0.2s;
            cursor: pointer;
        }
        .song-item:hover { background: rgba(255,255,255,0.1); }
        .song-item.playing { background: rgba(157, 78, 221, 0.2); }
        .song-item.playing .title { color: var(--accent-purple); }

        .item-cover { width: 40px; height: 40px; border-radius: 2px; object-fit: cover; }
        .title { font-weight: 500; font-size: 15px; }
        .artist { color: var(--text-dim); font-size: 14px; }

        /* FOOTER / CONTACT INFO */
        .footer-info {
            margin-top: 60px;
            padding: 40px 0;
            border-top: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .contact-box h3 { color: var(--accent-purple); font-size: 14px; margin-bottom: 15px; }
        .contact-box a { color: white; text-decoration: none; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 14px; opacity: 0.8; }
        .powered { font-size: 12px; color: var(--text-dim); }

        /* PLAYER BAR (YOUTUBE STYLE) */
        .player-bar {
            height: 72px;
            background: #111;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-top: 1px solid #222;
            z-index: 2000;
        }

        .p-info { display: flex; align-items: center; gap: 15px; width: 300px; }
        .p-cover { width: 48px; height: 48px; border-radius: 2px; }

        .p-controls { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .p-btns { display: flex; align-items: center; gap: 30px; margin-bottom: 5px; }
        .p-btns button { background: none; border: none; color: white; cursor: pointer; opacity: 0.8; }
        .p-btns button:hover { opacity: 1; }
        .p-play { background: white !important; color: black !important; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        .p-progress { width: 100%; max-width: 700px; display: flex; align-items: center; gap: 12px; font-size: 11px; color: var(--text-dim); }
        .p-bar { flex: 1; height: 3px; background: #333; position: relative; cursor: pointer; }
        .p-fill { height: 100%; background: var(--accent-purple); width: 0%; box-shadow: 0 0 8px var(--accent-purple); }

        /* VOLUME */
        .p-vol { width: 300px; display: flex; justify-content: flex-end; align-items: center; gap: 15px; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <i data-lucide="menu" style="cursor: pointer;"></i>
            <div class="nav-logo">EWINTH MUSIC</div>
        </div>
        <div class="nav-center">
            <span class="active">Beranda</span>
            <span>Jelajahi</span>
            <span>Koleksi</span>
        </div>
        <div style="width: 100px;"></div>
    </nav>

    <div class="main-view">
        <div class="section-title">Lagu Populer</div>
        
        <div class="song-list" id="list-container">
            </div>

        <div class="footer-info">
            <div class="contact-box">
                <h3>HUBUNGI DEVELOPER</h3>
                <a href="https://wa.me/6283862722618"><i data-lucide="phone" size="16"></i> 083862722618</a>
                <a href="mailto:ceritasemalam001@gmail.com"><i data-lucide="mail" size="16"></i> ceritasemalam001@gmail.com</a>
            </div>
            <div class="powered">
                <p>Powered by <b>Ewinth Revenge</b></p>
                <p style="font-size: 10px; opacity: 0.5;">© 2026 Official Music Player</p>
            </div>
        </div>
    </div>

    <div class="player-bar">
        <div class="p-info">
            <img src="" id="p-img" class="p-cover">
            <div>
                <div id="p-title" style="font-size: 14px; font-weight: 500;">Pilih Lagu</div>
                <div id="p-artist" style="font-size: 12px; color: var(--text-dim);">Ewinth Revenge</div>
            </div>
        </div>

        <div class="p-controls">
            <div class="p-btns">
                <button onclick="toggleShuffle()" id="btn-shf"><i data-lucide="shuffle" size="18"></i></button>
                <button onclick="prev()"><i data-lucide="skip-back" size="20"></i></button>
                <button class="p-play" onclick="togglePlay()"><i data-lucide="play" id="icon-play" size="18"></i></button>
                <button onclick="next()"><i data-lucide="skip-forward" size="20"></i></button>
                <button onclick="toggleRepeat()" id="btn-rep"><i data-lucide="repeat" size="18"></i></button>
            </div>
            <div class="p-progress">
                <span id="time-now">0:00</span>
                <div class="p-bar"><div class="p-fill" id="p-fill"></div></div>
                <span id="time-total">0:00</span>
            </div>
        </div>

        <div class="p-vol">
            <i data-lucide="volume-2" size="20" color="#aaa"></i>
            <div style="width: 80px; height: 3px; background: #333;"></div>
        </div>
    </div>

    <audio id="main-audio" crossorigin="anonymous"></audio>

    <script>
        const audio = document.getElementById('main-audio');
        let index = 0;
        let isShuffle = false;
        let isRepeat = false;

        const base = "https://raw.githubusercontent.com/jvngwe9991/jvngwe9991.github.io/main/";

        const songs = [
            {
                title: "Left For Dead",
                artist: "Ewinth Revenge",
                cover: base + encodeURIComponent("left for dead.jpeg"),
                url: base + encodeURIComponent("left for dead.mp3")
            },
            {
                title: "Takdir Memisahkan",
                artist: "Ewinth Revenge",
                cover: base + encodeURIComponent("takdir memisahkan.jpeg"),
                url: base + encodeURIComponent("takdir memisahkan.mp3")
            }
        ];

        function init() {
            const container = document.getElementById('list-container');
            container.innerHTML = songs.map((s, i) => `
                <div class="song-item" id="item-${i}" onclick="playSong(${i})">
                    <img src="${s.cover}" class="item-cover">
                    <div class="title">${s.title}</div>
                    <div class="artist">${s.artist}</div>
                    <div class="artist" style="text-align: right;">MP3</div>
                </div>
            `).join('');
            loadSong(0);
        }

        function loadSong(i) {
            index = i;
            audio.src = songs[i].url;
            document.getElementById('p-title').innerText = songs[i].title;
            document.getElementById('p-img').src = songs[i].cover;
            
            document.querySelectorAll('.song-item').forEach(el => el.classList.remove('playing'));
            document.getElementById(`item-${i}`).classList.add('playing');
        }

        function playSong(i) {
            loadSong(i);
            audio.play();
            updateIcon(true);
        }

        function togglePlay() {
            audio.paused ? (audio.play(), updateIcon(true)) : (audio.pause(), updateIcon(false));
        }

        function updateIcon(play) {
            document.getElementById('icon-play').setAttribute('data-lucide', play ? 'pause' : 'play');
            lucide.createIcons();
        }

        function next() {
            if(isShuffle) index = Math.floor(Math.random() * songs.length);
            else index = (index + 1) % songs.length;
            playSong(index);
        }

        function prev() {
            index = (index - 1 + songs.length) % songs.length;
            playSong(index);
        }

        function toggleShuffle() {
            isShuffle = !isShuffle;
            document.getElementById('btn-shf').style.color = isShuffle ? 'var(--accent-purple)' : 'white';
        }

        function toggleRepeat() {
            isRepeat = !isRepeat;
            document.getElementById('btn-rep').style.color = isRepeat ? 'var(--accent-purple)' : 'white';
        }

        audio.ontimeupdate = () => {
            if(audio.duration) {
                const p = (audio.currentTime / audio.duration) * 100;
                document.getElementById('p-fill').style.width = p + "%";
                document.getElementById('time-now').innerText = format(audio.currentTime);
                document.getElementById('time-total').innerText = format(audio.duration);
            }
        };

        audio.onended = () => isRepeat ? audio.play() : next();

        function format(s) {
            let m = Math.floor(s/60), sec = Math.floor(s%60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        lucide.createIcons();
        init();
    </script>
</body>
</html>
