<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EWINTH REVENGE MUSIC DEMO</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --accent: #9d4edd;
            --bg: #030303;
            --surface: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --text-dim: #b3b3b3;
        }

        * { box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; position: relative; }

        /* DYNAMIC BACKGROUND */
        #bg-blur {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            filter: blur(80px) brightness(0.3); z-index: -1; transition: 0.8s ease;
        }

        /* NAVIGATION TOP */
        .navbar {
            height: 60px; display: flex; align-items: center; padding: 0 20px;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            position: fixed; top: 0; width: 100%; z-index: 100;
        }
        .nav-logo { font-weight: 900; color: var(--accent); font-size: 18px; letter-spacing: 2px; text-transform: uppercase; }

        /* NAVIGATION BOTTOM */
        .nav-bottom {
            height: 70px; display: flex; align-items: center; justify-content: space-around;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(15px);
            position: fixed; bottom: 0; width: 100%; z-index: 100; border-top: 1px solid rgba(255,255,255,0.1);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; color: var(--text-dim); }
        .nav-item.active { color: var(--accent); }
        .nav-item span { font-size: 10px; margin-top: 4px; font-weight: bold; }

        /* CONTENT AREA */
        .content { height: 100vh; overflow-y: auto; padding: 80px 10px 100px 10px; display: none; }
        .content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* PLAYER VIEW */
        .player-view { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; text-align: center; }
        .album-art { width: 80%; max-width: 300px; aspect-ratio: 1; border-radius: 12px; object-fit: cover; box-shadow: 0 10px 60px rgba(0,0,0,0.8); margin-bottom: 30px; }
        
        .eq { display: flex; gap: 4px; height: 20px; margin-bottom: 10px; align-items: flex-end; }
        .bar { width: 3px; background: var(--accent); border-radius: 2px; height: 3px; }
        .playing .bar { animation: wave 0.6s infinite alternate; }
        @keyframes wave { from { height: 3px; } to { height: 20px; } }

        .song-title { font-size: 22px; font-weight: 800; margin: 0; }
        .song-artist { color: var(--accent); font-weight: 600; margin: 5px 0 25px 0; font-size: 14px; }

        /* CONTROLS */
        .bar-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; cursor: pointer; position: relative; max-width: 350px; margin: 0 auto; }
        .bar-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 2px; position: relative; }
        .times { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-dim); margin-top: 8px; max-width: 350px; margin-left: auto; margin-right: auto; }
        .main-btns { display: flex; align-items: center; justify-content: center; gap: 35px; margin: 25px 0; }
        .play-circle { width: 60px; height: 60px; background: white; color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* GRID JELAJAHI - OTOMATIS MUNCUL JIKA ADA DATA */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); 
            gap: 10px; 
        }
        .card { 
            background: var(--surface); 
            padding: 5px; 
            border-radius: 8px; 
            cursor: pointer; 
            border: 1px solid rgba(255,255,255,0.03); 
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card:active { transform: scale(0.9); }
        .card img { width: 100%; aspect-ratio: 1; border-radius: 5px; object-fit: cover; }
        .card-info { 
            margin-top: 5px; 
            font-size: 9px; 
            font-weight: 900; 
            text-align: center; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
            text-transform: uppercase;
        }

        /* CONTACT */
        .contact-box { background: var(--surface); padding: 40px 20px; border-radius: 24px; text-align: center; border: 1px solid rgba(157, 78, 221, 0.3); }
        .contact-link { display: block; margin: 20px 0; font-size: 14px; font-weight: 900; color: white; text-decoration: none; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .powered { font-size: 10px; font-weight: 900; color: var(--text-dim); margin-top: 40px; text-transform: uppercase; letter-spacing: 2px; }
        .powered b { color: var(--accent); }

    </style>
</head>
<body id="body-player">

    <div id="bg-blur"></div>

    <nav class="navbar">
        <div class="nav-logo">EWINTH REVENGE</div>
    </nav>

    <div id="tab-home-content" class="content active">
        <div class="player-view">
            <img src="" id="p-img" class="album-art" onerror="this.src='https://via.placeholder.com/300/333/9d4edd?text=ER'">
            <div class="eq">
                <div class="bar" style="animation-delay: 0.1s"></div>
                <div class="bar" style="animation-delay: 0.3s"></div>
                <div class="bar" style="animation-delay: 0.5s"></div>
                <div class="bar" style="animation-delay: 0.2s"></div>
            </div>
            <h1 class="song-title" id="p-title">Pilih Lagu...</h1>
            <p class="song-artist" id="p-artist">Ewinth Revenge</p>
            <div class="controls">
                <div class="bar-bg" id="seek-bar"><div class="bar-fill" id="bar-fill"></div></div>
                <div class="times"><span id="time-now">0:00</span><span id="time-total">0:00</span></div>
                <div class="main-btns">
                    <i data-lucide="skip-back" onclick="prev()" style="cursor:pointer"></i>
                    <div class="play-circle" onclick="toggle()"><i data-lucide="play" id="play-icon" size="28"></i></div>
                    <i data-lucide="skip-forward" onclick="next()" style="cursor:pointer"></i>
                </div>
            </div>
        </div>
    </div>

    <div id="tab-explore-content" class="content">
        <h2 style="font-weight: 900; margin-bottom: 20px; font-size: 18px; letter-spacing: 1px;">LIBRARY</h2>
        <div class="grid" id="grid-render"></div>
    </div>

    <div id="tab-contact-content" class="content">
        <div class="contact-box">
            <h2 style="color:var(--accent); font-weight:900;">HUBUNGI SAYA</h2>
            <a href="mailto:ceritasemalam001@gmail.com/hanyasementara001@gmail.com" class="contact-link"><i data-lucide="mail" style="margin-right:10px; vertical-align:middle; color:var(--accent);"></i> CERITASEMALAM001@GMAIL.COM</a>
            <a href="https://wa.me/6283862722618" class="contact-link"><i data-lucide="message-circle" style="margin-right:10px; vertical-align:middle; color:var(--accent);"></i> 083862722618</a>
            <div class="powered">POWERED BY <b>EWINTH REVENGE</b></div>
        </div>
    </div>

    <div class="nav-bottom">
        <div class="nav-item active" onclick="switchTab('home')" id="nav-home"><i data-lucide="play"></i><span>PLAYER</span></div>
        <div class="nav-item" onclick="switchTab('explore')" id="nav-explore"><i data-lucide="layout-grid"></i><span>LIBRARY</span></div>
        <div class="nav-item" onclick="switchTab('contact')" id="nav-contact"><i data-lucide="mail"></i><span>KONTAK</span></div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const audio = document.getElementById('audio-player');
        let index = 0;

        // DATA UTAMA: Tambahkan lagu baru di sini.
        // Lagu akan otomatis muncul di Library jika file bukan "#"
        const songs = [
            { 
                title: "Left For Dead", 
                artist: "Ewinth Revenge", 
                file: "left for dead.mp3", 
                img: "left for dead.jpeg" 
            },
            { 
                title: "Takdir Memisahkan", 
                artist: "Ewinth Revenge", 
                file: "takdir memisahkan.mp3", 
                img: "takdir memisahkan.jpeg" 
            }
        ];

        // Filter lagu yang benar-benar ada filenya
        const activeSongs = songs.filter(s => s.file !== "#");

        function switchTab(tab) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`tab-${tab}-content`).classList.add('active');
            document.getElementById(`nav-${tab}`).classList.add('active');
        }

        function loadSong(i) {
            if(activeSongs.length === 0) return;
            index = i;
            const s = activeSongs[i];
            audio.src = encodeURIComponent(s.file);
            document.getElementById('p-title').innerText = s.title;
            document.getElementById('p-artist').innerText = s.artist;
            document.getElementById('p-img').src = encodeURIComponent(s.img);
            document.getElementById('bg-blur').style.backgroundImage = `url('${encodeURIComponent(s.img)}')`;
        }

        function playSong(i) {
            loadSong(i);
            audio.play();
            updateUI(true);
            switchTab('home');
        }

        function toggle() {
            if (audio.paused) { audio.play(); updateUI(true); }
            else { audio.pause(); updateUI(false); }
        }

        function updateUI(isPlay) {
            const icon = document.getElementById('play-icon');
            icon.setAttribute('data-lucide', isPlay ? 'pause' : 'play');
            if(isPlay) document.getElementById('body-player').classList.add('playing');
            else document.getElementById('body-player').classList.remove('playing');
            lucide.createIcons();
        }

        function renderGrid() {
            const grid = document.getElementById('grid-render');
            if(activeSongs.length === 0) {
                grid.innerHTML = "<p style='color:gray; font-size:12px;'>Belum ada lagu tersedia.</p>";
                return;
            }
            grid.innerHTML = activeSongs.map((s, i) => `
                <div class="card" onclick="playSong(${i})">
                    <img src="${encodeURIComponent(s.img)}" onerror="this.src='https://via.placeholder.com/100/333/9d4edd?text=MUSIC'">
                    <div class="card-info">${s.title}</div>
                </div>
            `).join('');
        }

        function next() { index = (index + 1) % activeSongs.length; playSong(index); }
        function prev() { index = (index - 1 + activeSongs.length) % activeSongs.length; playSong(index); }

        audio.ontimeupdate = () => {
            if(audio.duration) {
                const pos = (audio.currentTime / audio.duration) * 100;
                document.getElementById('bar-fill').style.width = pos + "%";
                document.getElementById('time-now').innerText = fmt(audio.currentTime);
                document.getElementById('time-total').innerText = fmt(audio.duration);
            }
        };

        function fmt(s) {
            let m = Math.floor(s/60), sec = Math.floor(s%60);
            return m + ":" + (sec < 10 ? '0' : '') + sec;
        }

        document.getElementById('seek-bar').onclick = (e) => {
            const p = e.offsetX / e.currentTarget.offsetWidth;
            audio.currentTime = p * audio.duration;
        };

        // Mulai
        renderGrid();
        loadSong(0);
        lucide.createIcons();
    </script>
</body>
</html>
