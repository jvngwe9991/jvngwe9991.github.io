<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EWINTH REVENGE | YT Music Style</title>
    <script src="https://lucide.dev/icons/lucide.min.js"></script>
    <style>
        :root {
            --accent: #9d4edd;
            --deep: #240046;
            --bg: #030303;
            --surface: #121212;
            --text: #ffffff;
            --text-dim: #aaaaaa;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* NAVBAR */
        .navbar {
            height: 64px; background: rgba(3, 3, 3, 0.98);
            display: flex; align-items: center; padding: 0 20px;
            border-bottom: 1px solid #222; position: fixed; top: 0; width: 100%; z-index: 1000;
        }
        .nav-logo { font-weight: 900; color: var(--accent); font-size: 22px; margin-right: 50px; cursor: pointer; }
        .nav-links { display: flex; gap: 30px; }
        .nav-links span { cursor: pointer; color: var(--text-dim); font-weight: 500; transition: 0.3s; }
        .nav-links span:hover, .nav-links span.active { color: white; }

        /* MAIN CONTENT */
        .content {
            margin-top: 64px; flex: 1; overflow-y: auto;
            padding: 30px 8%; background: radial-gradient(circle at top left, var(--deep) 0%, transparent 50%);
        }
        .page { display: none; animation: fadeIn 0.5s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h2 { font-size: 28px; margin-bottom: 20px; }

        /* LIST STYLE (BERANDA) */
        .song-row {
            display: grid; grid-template-columns: 50px 1fr 1fr 100px;
            align-items: center; padding: 10px 15px; border-radius: 6px;
            cursor: pointer; transition: 0.2s;
        }
        .song-row:hover { background: rgba(255,255,255,0.1); }
        .song-row.playing { background: rgba(157, 78, 221, 0.2); }
        .song-row img { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; }

        /* GRID STYLE (JELAJAHI) */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card { background: var(--surface); padding: 15px; border-radius: 8px; transition: 0.3s; cursor: pointer; border: 1px solid transparent; }
        .card:hover { background: #1a1a1a; border-color: var(--accent); }
        .card img { width: 100%; aspect-ratio: 1; border-radius: 6px; object-fit: cover; margin-bottom: 10px; }

        /* FOOTER INFO */
        .footer { margin-top: 50px; padding: 30px 0; border-top: 1px solid #222; color: var(--text-dim); font-size: 14px; }
        .footer b { color: var(--accent); }

        /* PLAYER BAR */
        .player {
            height: 85px; background: #000; border-top: 1px solid #222;
            display: flex; align-items: center; padding: 0 20px; z-index: 2000;
        }
        .p-info { width: 30%; display: flex; align-items: center; gap: 15px; }
        .p-info img { width: 50px; height: 50px; border-radius: 4px; border: 1px solid var(--accent); }
        .p-mid { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .p-btns { display: flex; align-items: center; gap: 25px; margin-bottom: 8px; }
        .btn-main { background: white; color: black; border: none; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        .p-progress { width: 100%; max-width: 600px; display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--text-dim); }
        .p-bar-bg { flex: 1; height: 3px; background: #333; cursor: pointer; position: relative; }
        .p-bar-fill { height: 100%; background: var(--accent); width: 0%; box-shadow: 0 0 10px var(--accent); }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo" onclick="switchPage('home')">EWINTH MUSIC</div>
        <div class="nav-links">
            <span id="link-home" class="active" onclick="switchPage('home')">Beranda</span>
            <span id="link-explore" onclick="switchPage('explore')">Jelajahi</span>
        </div>
    </nav>

    <div class="content">
        <div id="page-home" class="page active">
            <h2>Lagu Terkini</h2>
            <div id="list-container"></div>
        </div>

        <div id="page-explore" class="page">
            <h2>Jelajahi Koleksi</h2>
            <div class="grid-container" id="grid-container"></div>
        </div>

        <div class="footer">
            <div style="margin-bottom: 10px;">
                <b>Kontak:</b> 083862722618 | ceritasemalam001@gmail.com
            </div>
            Powered by <b>Ewinth Revenge</b>
        </div>
    </div>

    <div class="player">
        <div class="p-info">
            <img src="" id="p-img" onerror="this.src='https://via.placeholder.com/50/333/9d4edd?text=ER'">
            <div>
                <div id="p-title" style="font-weight: 600; font-size: 14px;">Pilih Lagu</div>
                <div id="p-artist" style="font-size: 12px; color: var(--text-dim);">Ewinth Revenge</div>
            </div>
        </div>
        <div class="p-mid">
            <div class="p-btns">
                <button onclick="prev()" style="background:none; border:none; color:white; cursor:pointer;"><i data-lucide="skip-back"></i></button>
                <button class="btn-main" onclick="toggle()"><i data-lucide="play" id="play-icon"></i></button>
                <button onclick="next()" style="background:none; border:none; color:white; cursor:pointer;"><i data-lucide="skip-forward"></i></button>
            </div>
            <div class="p-progress">
                <span id="time-now">0:00</span>
                <div class="p-bar-bg" id="bar-wrap"><div class="p-bar-fill" id="p-fill"></div></div>
                <span id="time-total">0:00</span>
            </div>
        </div>
        <div style="width: 30%;"></div>
    </div>

    <audio id="audio"></audio>

    <script>
        const audio = document.getElementById('audio');
        let index = 0;

        // DATA LAGU: Langsung menggunakan nama file yang ada di repository Anda
        const mySongs = [
            {
                title: "Left For Dead",
                artist: "Ewinth Revenge",
                cover: "left for dead.jpeg", 
                url: "left for dead.mp3"
            },
            {
                title: "Takdir Memisahkan",
                artist: "Ewinth Revenge",
                cover: "takdir memisahkan.jpeg",
                url: "takdir memisahkan.mp3"
            }
        ];

        function switchPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-links span').forEach(s => s.classList.remove('active'));
            document.getElementById('page-' + page).classList.add('active');
            document.getElementById('link-' + page).classList.add('active');
        }

        function render() {
            document.getElementById('list-container').innerHTML = mySongs.map((s, i) => `
                <div class="song-row" id="row-${i}" onclick="playSong(${i})">
                    <img src="${s.cover}" onerror="this.src='https://via.placeholder.com/40/333/9d4edd?text=ER'">
                    <div style="font-weight:500;">${s.title}</div>
                    <div style="color:var(--text-dim);">${s.artist}</div>
                    <div style="text-align:right; color:var(--accent); font-size:12px;">MP3</div>
                </div>
            `).join('');

            document.getElementById('grid-container').innerHTML = mySongs.map((s, i) => `
                <div class="card" onclick="playSong(${i})">
                    <img src="${s.cover}" onerror="this.src='https://via.placeholder.com/150/333/9d4edd?text=ER'">
                    <div style="font-weight:600; font-size:14px;">${s.title}</div>
                    <div style="color:var(--text-dim); font-size:12px;">${s.artist}</div>
                </div>
            `).join('');
        }

        function load(i) {
            index = i;
            audio.src = mySongs[i].url;
            document.getElementById('p-title').innerText = mySongs[i].title;
            document.getElementById('p-img').src = mySongs[i].cover;
            
            document.querySelectorAll('.song-row').forEach(r => r.classList.remove('playing'));
            if(document.getElementById(`row-${i}`)) document.getElementById(`row-${i}`).classList.add('playing');
        }

        function playSong(i) { load(i); audio.play(); setIcon(true); }
        function toggle() { audio.paused ? (audio.play(), setIcon(true)) : (audio.pause(), setIcon(false)); }
        function setIcon(play) { 
            document.getElementById('play-icon').setAttribute('data-lucide', play ? 'pause' : 'play'); 
            lucide.createIcons(); 
        }
        function next() { index = (index + 1) % mySongs.length; playSong(index); }
        function prev() { index = (index - 1 + mySongs.length) % mySongs.length; playSong(index); }

        audio.ontimeupdate = () => {
            if(audio.duration) {
                const p = (audio.currentTime / audio.duration) * 100;
                document.getElementById('p-fill').style.width = p + "%";
                document.getElementById('time-now').innerText = format(audio.currentTime);
                document.getElementById('time-total').innerText = format(audio.duration);
            }
        };
        function format(s) { let m = Math.floor(s/60), sec = Math.floor(s%60); return `${m}:${sec < 10 ? '0' : ''}${sec}`; }
        
        document.getElementById('bar-wrap').onclick = (e) => {
            const p = e.offsetX / e.currentTarget.offsetWidth;
            audio.currentTime = p * audio.duration;
        };

        audio.onended = next;
        lucide.createIcons();
        render(); 
        if(mySongs.length > 0) load(0);
    </script>
</body>
</html>
