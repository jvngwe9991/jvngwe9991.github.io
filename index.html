<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EWINTH REVENGE | Gold Player</title>
    <script src="https://lucide.dev/icons/lucide.min.js"></script>
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-glow: rgba(212, 175, 55, 0.4);
            --bg-black: #050505;
            --panel-dark: #0d0d0d;
            --text-gray: #888;
        }
        * { box-sizing: border-box; }
        body { 
            background: var(--bg-black); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* SIDEBAR */
        .sidebar { width: 280px; background: black; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .nav-card { background: var(--panel-dark); border-radius: 12px; padding: 20px; border-left: 3px solid var(--gold); }
        
        /* LOGO KAMU (Ganti logo.jpg di GitHub) */
        .logo-container { text-align: center; margin-bottom: 25px; padding: 10px; }
        .user-logo { 
            width: 80px; height: 80px; 
            border-radius: 50%; 
            border: 2px solid var(--gold); 
            box-shadow: 0 0 15px var(--gold-glow);
            object-fit: cover;
            margin-bottom: 10px;
        }
        .logo-text { font-size: 16px; font-weight: 900; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; }

        .nav-link { 
            display: flex; align-items: center; gap: 15px; color: var(--text-gray); 
            text-decoration: none; padding: 12px 0; font-weight: 600; transition: 0.3s;
        }
        .nav-link:hover, .nav-link.active { color: var(--gold); }

        /* MAIN CONTENT */
        .main-view { flex: 1; background: linear-gradient(180deg, #151515 0%, #050505 100%); overflow-y: auto; padding: 40px; position: relative; }
        
        /* EQUALIZER CANVAS */
        #visualizer {
            position: absolute; top: 0; left: 0; width: 100%; height: 250px;
            z-index: 0; opacity: 0.5; pointer-events: none;
        }

        .header-content { position: relative; z-index: 1; display: flex; align-items: flex-end; gap: 30px; margin-top: 50px; }
        .album-frame { 
            width: 220px; height: 220px; background: #111; 
            border-radius: 8px; overflow: hidden; 
            border: 2px solid var(--gold); box-shadow: 0 10px 50px rgba(0,0,0,0.8);
        }
        .album-frame img { width: 100%; height: 100%; object-fit: cover; }

        /* TABLE */
        .tracklist { width: 100%; border-collapse: collapse; margin-top: 40px; position: relative; z-index: 1; }
        .tracklist th { text-align: left; color: var(--text-gray); border-bottom: 1px solid #222; padding: 10px; font-size: 11px; }
        .tracklist tr { transition: 0.2s; cursor: pointer; }
        .tracklist tr:hover { background: rgba(212, 175, 55, 0.05); }
        .tracklist td { padding: 12px 10px; color: #ccc; }
        .tracklist tr.playing td { color: var(--gold); font-weight: bold; }

        /* PLAYER BAR (Bottom) */
        .player-bar { 
            position: fixed; bottom: 0; width: 100%; height: 100px; 
            background: #080808; border-top: 1px solid #1a1a1a; 
            display: flex; align-items: center; padding: 0 30px; justify-content: space-between; z-index: 100;
        }
        .now-playing { display: flex; align-items: center; gap: 15px; width: 300px; }
        .mini-cover { width: 55px; height: 55px; border-radius: 4px; border: 1px solid var(--gold); overflow: hidden; }
        .mini-cover img { width: 100%; height: 100%; object-fit: cover; }
        
        .controls { display: flex; flex-direction: column; align-items: center; gap: 10px; flex: 1; }
        
        /* TOMBOL KONTROL GOLD */
        .control-btn { background: none; border: none; color: var(--text-gray); cursor: pointer; transition: 0.3s; padding: 5px; }
        .control-btn:hover, .control-btn.active { color: var(--gold); text-shadow: 0 0 10px var(--gold-glow); }
        
        .play-main { 
            background: var(--gold); color: black; 
            width: 45px; height: 45px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            border: none; cursor: pointer; transition: 0.3s;
            box-shadow: 0 0 15px var(--gold-glow);
        }
        .play-main:hover { transform: scale(1.05); background: white; }

        .progress-container { width: 500px; height: 5px; background: #222; border-radius: 3px; position: relative; cursor: pointer; }
        .progress-fill { height: 100%; background: var(--gold); width: 0%; box-shadow: 0 0 10px var(--gold); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-container">
            <img src="logo.jpg" alt="Logo" class="user-logo" id="mainLogo">
            <div class="logo-text">EWINTH REVENGE</div>
        </div>

        <div class="nav-card">
            <a href="#" class="nav-link active"><i data-lucide="music"></i> Collection</a>
            <a href="https://wa.me/628123456789" class="nav-link" target="_blank"><i data-lucide="message-circle"></i> WhatsApp</a>
            <a href="mailto:admin@ewinth.com" class="nav-link"><i data-lucide="mail"></i> Email Support</a>
        </div>
        
        <div class="nav-card" style="margin-top: 10px; flex: 1; display: flex; align-items: flex-end;">
            <p id="side-status" style="font-size: 11px; color: var(--gold);">Syncing Library...</p>
        </div>
    </div>

    <div class="main-view">
        <canvas id="visualizer"></canvas>

        <div class="header-content">
            <div class="album-frame"><img src="" id="bigCover"></div>
            <div>
                <p style="color: var(--gold); font-weight: 800; margin: 0; letter-spacing: 2px;">LIVE VISUALIZER ACTIVE</p>
                <h1 style="font-size: 60px; margin: 0; letter-spacing: -2px; text-transform: uppercase;">Ewinth Collection</h1>
                <p id="songCount" style="color: var(--text-gray); margin-top: 10px;">0 Songs Detected</p>
            </div>
        </div>

        <table class="tracklist">
            <thead>
                <tr><th style="width: 50px;">#</th><th>TITLE</th><th>ARTIST</th><th style="text-align: right;">STATUS</th></tr>
            </thead>
            <tbody id="trackBody"></tbody>
        </table>
        
        <div style="height: 120px;"></div>
    </div>

    <div class="player-bar">
        <div class="now-playing">
            <div class="mini-cover"><img src="" id="playerCover"></div>
            <div>
                <div id="playerTitle" style="font-weight: bold; font-size: 14px;">Select Music</div>
                <div id="playerArtist" style="font-size: 11px; color: var(--text-gray);">Ewinth Revenge</div>
            </div>
        </div>

        <div class="controls">
            <div style="display: flex; align-items: center; gap: 20px;">
                <button class="control-btn" id="shuffleBtn" onclick="toggleShuffle()"><i data-lucide="shuffle" size="18"></i></button>
                <button class="control-btn" onclick="prevTrack()"><i data-lucide="skip-back" size="22"></i></button>
                <button class="play-main" onclick="togglePlay()"><i data-lucide="play" id="playIcon"></i></button>
                <button class="control-btn" onclick="nextTrack()"><i data-lucide="skip-forward" size="22"></i></button>
                <button class="control-btn" id="repeatBtn" onclick="toggleRepeat()"><i data-lucide="repeat" size="18"></i></button>
            </div>
            <div class="progress-container" id="progContainer">
                <div class="progress-fill" id="progFill"></div>
            </div>
        </div>
        <div style="width: 300px; display: flex; justify-content: flex-end; color: var(--gold);">
            <i data-lucide="volume-2" size="20"></i>
        </div>
    </div>

    <audio id="audioNode" crossorigin="anonymous"></audio>

    <script>
        lucide.createIcons();

        // KONFIGURASI GITHUB (WAJIB ISI)
        const GITHUB_USER = "UsernameKamu"; 
        const GITHUB_REPO = "NamaRepoKamu";
        
        let playlist = [];
        let currentIdx = 0;
        let isShuffle = false;
        let isRepeat = false;
        const audio = document.getElementById('audioNode');
        
        // Setup Visualizer
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        let audioCtx, analyser, source, dataArray;

        async function scanLibrary() {
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`);
                const files = await response.json();
                const mp3Files = files.filter(f => f.name.toLowerCase().endsWith('.mp3'));
                
                playlist = mp3Files.map(file => {
                    const cleanName = file.name.replace('.mp3', '');
                    const [title, artist] = cleanName.includes(' - ') ? cleanName.split(' - ') : [cleanName, "Ewinth Revenge"];
                    return {
                        title: title.trim(),
                        artist: artist.trim(),
                        src: file.download_url,
                        cover: file.name.replace('.mp3', '.jpg')
                    };
                });

                if(playlist.length > 0) {
                    renderPlaylist();
                    loadTrack(0);
                    document.getElementById('side-status').innerText = `${playlist.length} Tracks Synced`;
                }
            } catch (e) {
                document.getElementById('side-status').innerText = "Sync Failed.";
            }
        }

        function renderPlaylist() {
            const body = document.getElementById('trackBody');
            body.innerHTML = '';
            playlist.forEach((s, i) => {
                const tr = document.createElement('tr');
                tr.id = `tr-${i}`;
                tr.onclick = () => { currentIdx = i; loadTrack(i); playTrack(); };
                tr.innerHTML = `<td>${i+1}</td><td>${s.title}</td><td>${s.artist}</td><td style="text-align: right; color: var(--gold); font-size: 10px;">READY</td>`;
                body.appendChild(tr);
            });
            document.getElementById('songCount').innerText = `${playlist.length} Songs Detected`;
        }

        function loadTrack(i) {
            if(!playlist[i]) return;
            const s = playlist[i];
            audio.src = s.src;
            document.getElementById('playerTitle').innerText = s.title;
            document.getElementById('playerArtist').innerText = s.artist;
            document.getElementById('playerCover').src = s.cover;
            document.getElementById('bigCover').src = s.cover;
            document.querySelectorAll('tr').forEach(r => r.classList.remove('playing'));
            const currentTr = document.getElementById(`tr-${i}`);
            if(currentTr) currentTr.classList.add('playing');
        }

        function togglePlay() {
            if (!audioCtx) initVisualizer(); // Inisialisasi saat pertama kali play
            if(audio.paused) playTrack(); else pauseTrack();
        }

        function playTrack() { audio.play(); document.getElementById('playIcon').setAttribute('data-lucide', 'pause'); lucide.createIcons(); }
        function pauseTrack() { audio.pause(); document.getElementById('playIcon').setAttribute('data-lucide', 'play'); lucide.createIcons(); }

        // FUNGSI NAVIGASI
        function nextTrack() {
            if(isRepeat) { loadTrack(currentIdx); playTrack(); return; } // Jika repeat aktif
            currentIdx = isShuffle ? Math.floor(Math.random()*playlist.length) : (currentIdx + 1) % playlist.length;
            loadTrack(currentIdx); playTrack();
        }

        function prevTrack() {
            currentIdx = (currentIdx - 1 + playlist.length) % playlist.length;
            loadTrack(currentIdx); playTrack();
        }

        function toggleShuffle() {
            isShuffle = !isShuffle;
            document.getElementById('shuffleBtn').classList.toggle('active');
        }

        function toggleRepeat() {
            isRepeat = !isRepeat;
            document.getElementById('repeatBtn').classList.toggle('active');
        }

        // FUNGSI EQUALIZER
        function initVisualizer() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                analyser.fftSize = 256;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                draw();
            } catch(e) { console.log("Visualizer Error:", e); }
        }

        function draw() {
            requestAnimationFrame(draw);
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            analyser.getByteFrequencyData(dataArray);
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const barWidth = (canvas.width / dataArray.length) * 2.5;
            let barHeight;
            let x = 0;

            for(let i = 0; i < dataArray.length; i++) {
                barHeight = dataArray[i] / 1.5;
                ctx.fillStyle = `rgba(212, 175, 55, ${barHeight / 200})`;
                ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                x += barWidth + 1;
            }
        }

        audio.ontimeupdate = () => {
            const p = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progFill').style.width = (p || 0) + "%";
        };

        audio.onended = () => nextTrack(); // Otomatis lanjut saat lagu habis

        scanLibrary();
    </script>
</body>
</html>
