<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EWINTH REVENGE</title>
    
    <meta name="theme-color" content="#9d4edd">
    <link rel="manifest" href="manifest.json">

    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --accent: #9d4edd;
            --bg: #030303;
            --surface: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --neon: 0 0 15px rgba(157, 78, 221, 0.9);
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; position: fixed; width: 100%; }

        #bg-blur { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; filter: blur(100px) brightness(0.2); z-index: -2; transition: 0.8s; }
        #bg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, transparent 0%, var(--bg) 95%); z-index: -1; }

        .navbar { height: 60px; display: flex; align-items: center; padding: 0 20px; position: fixed; top: 0; width: 100%; z-index: 100; background: rgba(0,0,0,0.4); backdrop-filter: blur(15px); }
        .nav-logo { font-weight: 900; color: var(--accent); letter-spacing: 2px; font-size: 14px; text-shadow: var(--neon); }

        .content { height: 100vh; overflow-y: auto; padding: 80px 20px 140px 20px; display: none; }
        .content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* PLAYER VIEW */
        .player-view { display: flex; flex-direction: column; align-items: center; text-align: center; }
        .album-art-main { width: 65vw; max-width: 250px; aspect-ratio: 1; border-radius: 30px; object-fit: cover; box-shadow: 0 20px 50px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1); }
        #visualizer { width: 65vw; max-width: 250px; height: 40px; margin: 10px 0; }

        .controls { width: 100%; max-width: 380px; position: relative; }
        .bar-bg { width: 100%; height: 5px; background: rgba(255,255,255,0.1); border-radius: 10px; cursor: pointer; margin-bottom: 8px; }
        .bar-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 10px; box-shadow: var(--neon); }
        .main-btns { display: flex; align-items: center; justify-content: center; gap: 30px; margin-bottom: 20px; }
        
        .opt-btns { display: flex; justify-content: center; gap: 8px; margin-top: 10px; }
        .pre-btn { background: var(--surface); border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 9px; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: bold; }

        /* VOLUME AUTO-HIDE STYLING */
        #vol-popover { position: absolute; bottom: 85px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); padding: 20px 10px; border-radius: 15px; border: 1px solid var(--accent); display: none; z-index: 100; }
        #vol-popover.active { display: block; animation: slideUp 0.2s ease; }
        .vol-slider { -webkit-appearance: none; width: 120px; height: 4px; background: #333; transform: rotate(-90deg); margin: 50px -50px; outline: none; border-radius: 5px; }
        .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 15px; height: 15px; background: var(--accent); border-radius: 50%; box-shadow: var(--neon); }

        .panel { width: 100%; padding: 15px; border-radius: 20px; background: rgba(0,0,0,0.8); display: none; border: 1px solid var(--accent); margin-top: 15px; }
        .panel.active { display: block; }

        .eq-sliders { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .eq-row { display: flex; align-items: center; gap: 10px; font-size: 10px; font-weight: 800; color: var(--accent); }
        .eq-input { flex: 1; -webkit-appearance: none; height: 4px; background: #333; border-radius: 5px; outline: none; }
        .eq-input::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: white; border-radius: 50%; }

        /* LIBRARY & KONTAK */
        .search-box { position: relative; margin-bottom: 15px; }
        .search-input { width: 100%; background: var(--surface); border: 1px solid rgba(255,255,255,0.1); padding: 12px 15px 12px 40px; border-radius: 15px; color: white; outline: none; }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-dim); }
        .grid-container.grid-mode { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
        .grid-container.list-mode .song-card { display: flex; align-items: center; gap: 15px; padding: 10px; background: var(--surface); margin-bottom: 8px; border-radius: 12px; }
        .grid-container.list-mode .song-card img { width: 50px; height: 50px; border-radius: 8px; }

        .contact-card { background: var(--surface); padding: 25px; border-radius: 20px; border: 1px solid rgba(157, 78, 221, 0.2); text-align: center; }
        .powered-text { margin-top: 35px; font-size: 10px; font-weight: 900; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; }

        .nav-bottom { height: 75px; display: flex; align-items: center; justify-content: space-around; background: rgba(0,0,0,0.95); position: fixed; bottom: 0; width: 100%; border-top: 1px solid rgba(157, 78, 221, 0.2); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #555; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        @keyframes slideUp { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }
    </style>
</head>
<body>

    <div id="bg-blur"></div>
    <div id="bg-overlay"></div>
    <nav class="navbar"><div class="nav-logo">EWINTH REVENGE</div></nav>

    <div id="tab-home-content" class="content active">
        <div class="player-view">
            <img src="" id="p-img" class="album-art-main" onerror="this.src='https://via.placeholder.com/300/111/9d4edd?text=ER'">
            <canvas id="visualizer"></canvas>
            <h1 id="p-title" style="font-size: 18px; margin: 0; font-weight: 900;">Pilih Lagu</h1>
            <p id="p-artist" style="color: var(--accent); font-weight: 800; font-size: 11px; margin: 5px 0 20px 0;">EWINTH REVENGE</p>

            <div class="controls">
                <div class="bar-bg" id="seek-bar"><div class="bar-fill" id="bar-fill"></div></div>
                <div style="display:flex; justify-content:space-between; font-size:10px; margin-bottom:15px; font-weight:900;">
                    <span id="time-now">0:00</span><span id="time-total">0:00</span>
                </div>

                <div class="main-btns">
                    <i data-lucide="skip-back" onclick="prev()"></i>
                    <div onclick="toggle()" style="background:white; color:black; width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;">
                        <i data-lucide="play" id="play-icon"></i>
                    </div>
                    <i data-lucide="skip-forward" onclick="next()"></i>
                </div>

                <div class="opt-btns">
                    <button class="pre-btn" onclick="toggleVolumePop()"><i data-lucide="volume-2" size="14"></i></button>
                    <button class="pre-btn" onclick="togglePanel('lyrics')">LYRICS</button>
                    <button class="pre-btn" onclick="togglePanel('eq')">MANUAL EQ</button>
                </div>

                <div id="vol-popover">
                    <input type="range" class="vol-slider" min="0" max="1" step="0.01" value="1" oninput="setAudioVolume(this.value)">
                </div>

                <div class="panel" id="eq-panel">
                    <div id="preset-grid" style="display:grid; grid-template-columns: repeat(5, 1fr); gap:5px; margin-bottom:15px;"></div>
                    <div class="eq-sliders">
                        <div class="eq-row"><span>BASS</span><input type="range" class="eq-input" min="0" max="2" step="0.1" value="1" oninput="setEQ('bass', this.value)"></div>
                        <div class="eq-row"><span>MID</span><input type="range" class="eq-input" min="0" max="2" step="0.1" value="1" oninput="setEQ('mid', this.value)"></div>
                        <div class="eq-row"><span>TREB</span><input type="range" class="eq-input" min="0" max="2" step="0.1" value="1" oninput="setEQ('treble', this.value)"></div>
                    </div>
                </div>

                <div class="panel" id="lyrics-panel">
                    <div id="lyrics-content" style="white-space: pre-wrap; font-size: 14px; text-shadow: var(--neon);"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="tab-explore-content" class="content">
        <h2 style="font-weight:900;">LIBRARY</h2>
        <div class="search-box">
            <i data-lucide="search" size="18" class="search-icon"></i>
            <input type="text" class="search-input" id="search-input" placeholder="Cari musik..." onkeyup="filterSongs()">
        </div>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <button class="pre-btn" onclick="setView('grid')"><i data-lucide="layout-grid" size="14"></i></button>
            <button class="pre-btn" onclick="setView('list')"><i data-lucide="list" size="14"></i></button>
        </div>
        <div id="library-render" class="grid-container grid-mode"></div>
    </div>

    <div id="tab-contact-content" class="content">
        <h2 style="font-weight:900;">KONTAK</h2>
        <div class="contact-card">
            <p style="font-size: 14px; margin-bottom: 5px; font-weight: 800;">EWINTH REVENGE</p>
            <div style="display:flex; flex-direction:column; gap:12px; text-align: left; margin-top: 20px;">
                <div style="font-size:13px;"><i data-lucide="message-circle" size="14" style="vertical-align:middle; margin-right:10px; color:var(--accent);"></i> 083862722618</div>
                <div style="font-size:13px;"><i data-lucide="mail" size="14" style="vertical-align:middle; margin-right:10px; color:var(--accent);"></i> ceritasemalam001@gmail.com</div>
            </div>
            <div class="powered-text">EWINTH REVENGE</div>
        </div>
    </div>

    <div class="nav-bottom">
        <div class="nav-item active" onclick="switchTab('home')" id="nav-home"><i data-lucide="music"></i></div>
        <div class="nav-item" onclick="switchTab('explore')" id="nav-explore"><i data-lucide="layout-grid"></i></div>
        <div class="nav-item" onclick="switchTab('contact')" id="nav-contact"><i data-lucide="mail"></i></div>
    </div>

    <audio id="audio-player" crossorigin="anonymous"></audio>

    <script>
        const audio = document.getElementById('audio-player');
        let audioCtx, analyser, source, bassNode, midNode, trebleNode, index = 0, currentView = 'grid', volTimer;
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');

        const songs = [
            { title: "Left For Dead", artist: "Ewinth Revenge", file: "left for dead.mp3", img: "left for dead.jpeg", lirik: "Terjebak dalam sepi...\nWaktu seolah berhenti..." },
            { title: "Takdir Memisahkan", artist: "Ewinth Revenge", file: "takdir memisahkan.mp3", img: "takdir memisahkan.jpeg", lirik: "Berjalan di bawah hujan...\nMencari arti kenangan..." }
        ];

        const presets = { 'Normal': [1,1,1], 'Bass': [1.8,1,0.6], 'Rock': [1.5,0.8,1.4], 'Pop': [1.1,1.3,1.2], 'Jazz': [1.2,1.1,1.4], 'Classic': [0.8,1,1.6], 'Dance': [1.7,1,1.5], 'Electro': [1.6,1,1.8], 'Vocal': [0.6,1.7,1.1], 'Treble': [0.5,1,1.9] };

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            source = audioCtx.createMediaElementSource(audio);
            analyser = audioCtx.createAnalyser();
            bassNode = audioCtx.createBiquadFilter(); bassNode.type = 'lowshelf'; bassNode.frequency.value = 250;
            midNode = audioCtx.createBiquadFilter(); midNode.type = 'peaking'; midNode.frequency.value = 1000;
            trebleNode = audioCtx.createBiquadFilter(); trebleNode.type = 'highshelf'; trebleNode.frequency.value = 4000;
            source.connect(analyser); analyser.connect(bassNode); bassNode.connect(midNode); midNode.connect(trebleNode); trebleNode.connect(audioCtx.destination);
            drawVisualizer();
        }

        function drawVisualizer() {
            requestAnimationFrame(drawVisualizer);
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const barWidth = (canvas.width / 32);
            for(let i = 0; i < 32; i++) {
                const barHeight = dataArray[i] / 6;
                ctx.fillStyle = '#9d4edd'; ctx.fillRect(i * barWidth, canvas.height - barHeight, barWidth - 2, barHeight);
            }
        }

        function toggleVolumePop() {
            const pop = document.getElementById('vol-popover');
            pop.classList.toggle('active');
            if(pop.classList.contains('active')) {
                clearTimeout(volTimer);
                volTimer = setTimeout(() => pop.classList.remove('active'), 3000);
            }
        }

        function setAudioVolume(v) {
            audio.volume = v;
            clearTimeout(volTimer);
            volTimer = setTimeout(() => document.getElementById('vol-popover').classList.remove('active'), 3000);
        }

        function setEQ(band, v) { initAudio(); let gain = (v - 1) * 20; if(band==='bass') bassNode.gain.value = gain; if(band==='mid') midNode.gain.value = gain; if(band==='treble') trebleNode.gain.value = gain; }
        
        function applyPre(name) {
            const [b, m, t] = presets[name];
            setEQ('bass', b); setEQ('mid', m); setEQ('treble', t);
            document.querySelectorAll('.eq-input')[0].value = b;
            document.querySelectorAll('.eq-input')[1].value = m;
            document.querySelectorAll('.eq-input')[2].value = t;
        }

        function setView(v) { currentView = v; filterSongs(); }

        function filterSongs() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const filtered = songs.filter(s => s.title.toLowerCase().includes(q));
            const container = document.getElementById('library-render');
            container.className = `grid-container ${currentView}-mode`;
            container.innerHTML = filtered.map((s, i) => `
                <div class="song-card" onclick="playIdx(${songs.indexOf(s)})">
                    <img src="${encodeURIComponent(s.img)}">
                    <div style="font-size:10px; font-weight:800; ${currentView==='grid'?'margin-top:8px':''};">${s.title}</div>
                </div>`).join('');
        }

        function togglePanel(p) {
            const panel = document.getElementById(p + '-panel');
            const isActive = panel.classList.contains('active');
            document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
            if(!isActive) panel.classList.add('active');
        }

        function switchTab(t) { 
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`tab-${t}-content`).classList.add('active');
            document.getElementById(`nav-${t}`).classList.add('active');
        }

        function loadSong(i) {
            const s = songs[i];
            audio.src = encodeURIComponent(s.file);
            document.getElementById('p-title').innerText = s.title;
            document.getElementById('p-img').src = encodeURIComponent(s.img);
            document.getElementById('bg-blur').style.backgroundImage = `url('${encodeURIComponent(s.img)}')`;
            document.getElementById('lyrics-content').innerText = s.lirik;
        }

        function toggle() { initAudio(); audio.paused ? audio.play() : audio.pause(); updateUI(); }
        function updateUI() { document.getElementById('play-icon').setAttribute('data-lucide', audio.paused?'play':'pause'); lucide.createIcons(); }
        function next() { index = (index + 1) % songs.length; playIdx(index); }
        function prev() { index = (index - 1 + songs.length) % songs.length; playIdx(index); }
        function playIdx(i) { index = i; loadSong(i); audio.play(); updateUI(); switchTab('home'); initAudio(); }

        audio.ontimeupdate = () => { if(audio.duration) { document.getElementById('bar-fill').style.width = (audio.currentTime/audio.duration)*100+"%"; document.getElementById('time-now').innerText = fmt(audio.currentTime); document.getElementById('time-total').innerText = fmt(audio.duration); } };
        function fmt(s) { let m=Math.floor(s/60), sec=Math.floor(s%60); return m+":"+(sec<10?'0':'')+sec; }

        document.getElementById('preset-grid').innerHTML = Object.keys(presets).map(p => `<button class="pre-btn" onclick="applyPre('${p}')">${p}</button>`).join('');
        loadSong(0); filterSongs(); lucide.createIcons();
    </script>
</body>
</html>
