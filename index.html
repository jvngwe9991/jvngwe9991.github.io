<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EWINTH REVENGE | Live</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --accent: #9d4edd;
            --accent-glow: rgba(157, 78, 221, 0.6);
            --bg: #030303;
            --surface: rgba(255, 255, 255, 0.06);
            --text: #ffffff;
            --text-dim: #b3b3b3;
            --font-main: 'Roboto', 'Inter', sans-serif;
        }

        * { box-sizing: border-box; font-family: var(--font-main); -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; position: relative; }

        /* DYNAMIC BACKGROUND BLUR */
        #bg-blur {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            filter: blur(80px) brightness(0.2); z-index: -2; transition: 0.8s ease;
        }
        #bg-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 0%, var(--bg) 90%); z-index: -1;
        }

        /* NAVIGATION TOP */
        .navbar {
            height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(15px);
            position: fixed; top: 0; width: 100%; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .nav-logo { font-weight: 900; color: var(--accent); font-size: 16px; letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 0 10px var(--accent-glow); }

        /* NAVIGATION BOTTOM */
        .nav-bottom {
            height: 75px; display: flex; align-items: center; justify-content: space-around;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
            position: fixed; bottom: 0; width: 100%; z-index: 100; border-top: 1px solid rgba(255,255,255,0.1);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; color: var(--text-dim); transition: 0.2s; }
        .nav-item.active { color: var(--accent); text-shadow: 0 0 10px var(--accent-glow); }
        .nav-item span { font-size: 10px; margin-top: 5px; font-weight: 900; }

        /* CONTENT AREA */
        .content { height: 100vh; overflow-y: auto; padding: 80px 20px 120px 20px; display: none; scroll-behavior: smooth; }
        .content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* PLAYER VIEW */
        .player-view { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; text-align: center; }
        .album-wrapper { position: relative; width: 85%; max-width: 300px; margin-bottom: 30px; }
        .album-art { width: 100%; aspect-ratio: 1; border-radius: 12px; object-fit: cover; box-shadow: 0 15px 50px rgba(0,0,0,0.9); border: 1px solid rgba(255,255,255,0.1); transition: 0.5s; }
        
        /* DYNAMIC VISUALIZER (BARS) */
        .viz-container {
            display: flex; justify-content: center; align-items: flex-end;
            gap: 3px; height: 30px; width: 100%; max-width: 300px; margin-top: -15px; margin-bottom: 25px; z-index: 2;
        }
        .viz-bar { width: 4px; background: var(--accent); border-radius: 2px; height: 3px; transition: height 0.05s ease; box-shadow: 0 0 10px var(--accent-glow); }

        .song-title { font-size: 26px; font-weight: 900; margin: 0; letter-spacing: -0.5px; }
        .song-artist { color: var(--accent); font-weight: 700; margin: 5px 0 25px 0; font-size: 16px; opacity: 0.8; }

        /* CONTROLS */
        .controls { width: 100%; max-width: 400px; margin-top: 20px; }
        .bar-bg { width: 100%; height: 5px; background: rgba(255,255,255,0.15); border-radius: 3px; cursor: pointer; position: relative; }
        .bar-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 3px; position: relative; box-shadow: 0 0 15px var(--accent); }
        .bar-fill::after { content: ''; position: absolute; right: -6px; top: -4px; width: 13px; height: 13px; background: white; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .times { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); margin-top: 10px; font-weight: 900; }

        .main-btns { display: flex; align-items: center; justify-content: center; gap: 40px; margin: 30px 0; }
        .play-circle { width: 68px; height: 68px; background: white; color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .play-circle:active { transform: scale(0.92); background: #eee; }

        /* EQUALIZER & LYRICS TOGGLE */
        .opt-btns { display: flex; justify-content: center; gap: 15px; margin-top: 10px; }
        .opt-btn { background: var(--surface); border: 1px solid rgba(255,255,255,0.05); color: var(--text-dim); padding: 8px 15px; border-radius: 20px; font-size: 11px; font-weight: 900; cursor: pointer; transition: 0.2s; }
        .opt-btn.active { background: rgba(157, 78, 221, 0.2); color: white; border-color: var(--accent); }

        /* LYRICS PANEL */
        .lyrics-panel {
            width: 100%; max-width: 400px; height: 150px; overflow-y: auto;
            margin-top: 20px; padding: 15px; border-radius: 12px;
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.03);
            display: none; scroll-behavior: smooth;
        }
        .lyrics-panel.active { display: block; animation: slideDown 0.3s ease; }
        .lyric-line { font-size: 14px; color: var(--text-dim); margin-bottom: 10px; font-weight: 500; transition: 0.2s; }
        .lyric-line.active { color: white; font-weight: 900; transform: scale(1.03); text-shadow: 0 0 10px rgba(255,255,255,0.3); }

        /* EQ PANEL */
        .eq-panel {
            width: 100%; max-width: 400px; margin-top: 20px; padding: 20px; border-radius: 12px;
            background: var(--surface); border: 1px solid rgba(255,255,255,0.03);
            display: none;
        }
        .eq-panel.active { display: block; animation: slideDown 0.3s ease; }
        .eq-slider-box { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .eq-label { font-size: 11px; font-weight: 900; color: var(--text-dim); text-transform: uppercase; width: 60px; }
        .eq-slider { flex: 1; accent-color: var(--accent); cursor: pointer; }

        /* LIBRARY & SEARCH */
        .lib-header { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        .search-wrapper { position: relative; width: 100%; }
        .search-bar { width: 100%; background: var(--surface); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; padding: 12px 15px 12px 45px; color: white; font-size: 14px; font-weight: 500; transition: 0.2s; }
        .search-bar:focus { border-color: var(--accent); outline: none; background: rgba(255,255,255,0.08); box-shadow: 0 0 15px rgba(157, 78, 221, 0.15); }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.3); transition: 0.2s; }

        .view-switcher { display: flex; gap: 10px; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 10px; align-self: flex-start; }
        .view-btn { padding: 8px; border-radius: 8px; cursor: pointer; color: rgba(255,255,255,0.4); transition: 0.2s; border: none; background: transparent; display: flex; align-items: center; }
        .view-btn.active { background: var(--accent); color: white; box-shadow: 0 4px 10px var(--accent-glow); }

        /* GRID vs LIST */
        .grid { display: grid; gap: 12px; }
        .grid.mode-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
        .grid.mode-grid .card { background: var(--surface); padding: 8px; border-radius: 10px; text-align: center; border: 1px solid rgba(255,255,255,0.03); transition: 0.2s; }
        .grid.mode-grid .card img { width: 100%; aspect-ratio: 1; border-radius: 7px; margin-bottom: 8px; object-fit: cover; }
        .grid.mode-grid .card-info { font-size: 10px; font-weight: 900; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .grid.mode-list { grid-template-columns: 1fr; gap: 8px; }
        .grid.mode-list .card { display: flex; align-items: center; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; gap: 15px; border: 1px solid transparent; transition: 0.2s; }
        .grid.mode-list .card img { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; }
        .grid.mode-list .card-info { font-size: 15px; font-weight: 700; color: white; }
        .grid.mode-list .card-info span { display: block; font-size: 12px; color: var(--text-dim); font-weight: 500; margin-top: 3px; }

        /* CONTACT SECTION - REVISED */
        .contact-box { background: var(--surface); padding: 45px 20px; border-radius: 28px; text-align: center; border: 1px solid rgba(157, 78, 221, 0.4); backdrop-filter: blur(15px); }
        .contact-box h2 { font-weight: 900; font-size: 22px; letter-spacing: 1px; color: var(--text); margin-bottom: 30px; }
        .contact-link { display: flex; align-items: center; justify-content: center; margin: 15px 0; font-size: 14px; font-weight: 700; color: white; text-decoration: none; background: rgba(255,255,255,0.05); padding: 18px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); transition: 0.2s; text-transform: none; }
        .contact-link:active { transform: scale(0.96); background: rgba(255,255,255,0.1); }
        .contact-link i { margin-right: 12px; color: var(--accent); }
        .contact-email { text-transform: lowercase !important; font-weight: 500; }
        .powered-by { font-size: 11px; font-weight: 900; color: var(--text-dim); margin-top: 50px; text-transform: uppercase; letter-spacing: 3px; opacity: 0.7; }
        .powered-by b { color: var(--accent); }

    </style>
</head>
<body id="body-player">

    <div id="bg-blur"></div>
    <div id="bg-overlay"></div>

    <nav class="navbar">
        <div class="nav-logo">EWINTH REVENGE</div>
    </nav>

    <div id="tab-home-content" class="content active">
        <div class="player-view">
            <div class="album-wrapper">
                <img src="" id="p-img" class="album-art" onerror="this.src='https://via.placeholder.com/300/111/9d4edd?text=ER'">
            </div>
            <div class="viz-container" id="viz-container">
                <div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div>
            </div>
            <h1 class="song-title" id="p-title">Memuat...</h1>
            <p class="song-artist" id="p-artist">Ewinth Revenge</p>
            <div class="controls">
                <div class="bar-bg" id="seek-bar"><div class="bar-fill" id="bar-fill"></div></div>
                <div class="times"><span id="time-now">0:00</span><span id="time-total">0:00</span></div>
                <div class="main-btns">
                    <i data-lucide="skip-back" onclick="prev()" style="cursor:pointer"></i>
                    <div class="play-circle" onclick="toggle()"><i data-lucide="play" id="play-icon" size="32"></i></div>
                    <i data-lucide="skip-forward" onclick="next()" style="cursor:pointer"></i>
                </div>
                <div class="opt-btns">
                    <button class="opt-btn" id="btn-lyrics" onclick="togglePanel('lyrics')">LIRIK</button>
                    <button class="opt-btn" id="btn-eq" onclick="togglePanel('eq')">EQ</button>
                </div>
                <div class="lyrics-panel" id="lyrics-panel"><div id="lyrics-content">Lirik tidak tersedia.</div></div>
                <div class="eq-panel" id="eq-panel">
                    <div class="eq-slider-box"><span class="eq-label">Bass</span><input type="range" class="eq-slider" min="0" max="2" step="0.1" value="1" oninput="setEQ('bass', this.value)"></div>
                    <div class="eq-slider-box"><span class="eq-label">Mid</span><input type="range" class="eq-slider" min="0" max="2" step="0.1" value="1" oninput="setEQ('mid', this.value)"></div>
                    <div class="eq-slider-box"><span class="eq-label">Treble</span><input type="range" class="eq-slider" min="0" max="2" step="0.1" value="1" oninput="setEQ('treble', this.value)"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="tab-explore-content" class="content">
        <div class="lib-header">
            <h2 style="font-weight: 900; font-size: 24px; margin: 0; letter-spacing:-1px;">LIBRARY</h2>
            <div class="search-wrapper">
                <input type="text" class="search-bar" id="search-input" placeholder="Cari musik..." onkeyup="filterSongs()">
                <i data-lucide="search" size="18" class="search-icon"></i>
            </div>
            <div class="view-switcher">
                <button class="view-btn active" id="btn-grid" onclick="setView('grid')"><i data-lucide="layout-grid" size="18"></i></button>
                <button class="view-btn" id="btn-list" onclick="setView('list')"><i data-lucide="list" size="18"></i></button>
            </div>
        </div>
        <div class="grid mode-grid" id="grid-render"></div>
    </div>

    <div id="tab-contact-content" class="content">
        <div class="contact-box">
            <h2>HUBUNGI SAYA</h2>
            <a href="mailto:ceritasemalam001@gmail.com" class="contact-link">
                <i data-lucide="mail"></i> 
                <span class="contact-email">ceritasemalam001@gmail.com</span>
            </a>
            <a href="https://wa.me/6283862722618" class="contact-link">
                <i data-lucide="message-circle"></i> 
                <span>0838 6272 2618</span>
            </a>
            <div class="powered-by">Powered by <b>Ewinth Revenge</b></div>
        </div>
    </div>

    <div class="nav-bottom">
        <div class="nav-item active" onclick="switchTab('home')" id="nav-home"><i data-lucide="music"></i><span>PLAYER</span></div>
        <div class="nav-item" onclick="switchTab('explore')" id="nav-explore"><i data-lucide="layout-grid"></i><span>LIBRARY</span></div>
        <div class="nav-item" onclick="switchTab('contact')" id="nav-contact"><i data-lucide="mail"></i><span>KONTAK</span></div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const audio = document.getElementById('audio-player');
        let index = 0;
        let currentView = 'grid';
        let visualizerInterval;

        const songs = [
            {
                title: "Left For Dead",
                artist: "Ewinth Revenge",
                file: "left for dead.mp3",
                img: "left for dead.jpeg",
                lirik: "[0:00] Intro\n[0:15] Vers 1: Terjebak dalam sepi..."
            },
            {
                title: "Takdir Memisahkan",
                artist: "Ewinth Revenge",
                file: "takdir memisahkan.mp3",
                img: "takdir memisahkan.jpeg",
                lirik: "[0:00] Intro\n[0:18] Berjalan sendiri..."
            }
        ];

        let audioCtx, source, bassNode, midNode, trebleNode;
        function initAudioAPI() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            source = audioCtx.createMediaElementSource(audio);
            bassNode = audioCtx.createBiquadFilter(); bassNode.type = 'lowshelf'; bassNode.frequency.value = 200;
            midNode = audioCtx.createBiquadFilter(); midNode.type = 'peaking'; midNode.frequency.value = 1000;
            trebleNode = audioCtx.createBiquadFilter(); trebleNode.type = 'highshelf'; trebleNode.frequency.value = 3000;
            source.connect(bassNode); bassNode.connect(midNode); midNode.connect(trebleNode); trebleNode.connect(audioCtx.destination);
        }

        function setEQ(band, value) {
            if (!audioCtx) initAudioAPI();
            let gain = (value - 1) * 20;
            if (band === 'bass') bassNode.gain.value = gain;
            if (band === 'mid') midNode.gain.value = gain;
            if (band === 'treble') trebleNode.gain.value = gain;
        }

        function startVisualizer() {
            const bars = document.querySelectorAll('.viz-bar');
            clearInterval(visualizerInterval);
            visualizerInterval = setInterval(() => {
                bars.forEach(bar => {
                    let h = Math.random() * 25 + 5;
                    if (Math.random() > 0.8) h = 30; 
                    bar.style.height = h + 'px';
                });
            }, 80);
        }
        function stopVisualizer() {
            clearInterval(visualizerInterval);
            document.querySelectorAll('.viz-bar').forEach(bar => bar.style.height = '3px');
        }

        function switchTab(tab) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`tab-${tab}-content`).classList.add('active');
            document.getElementById(`nav-${tab}`).classList.add('active');
        }

        function loadSong(i) {
            index = i;
            const s = songs[i];
            audio.src = encodeURIComponent(s.file);
            document.getElementById('p-title').innerText = s.title;
            document.getElementById('p-artist').innerText = s.artist;
            document.getElementById('p-img').src = encodeURIComponent(s.img);
            document.getElementById('bg-blur').style.backgroundImage = `url('${encodeURIComponent(s.img)}')`;
        }

        function playSong(i) {
            initAudioAPI();
            loadSong(i);
            audio.play();
            updateUI(true);
            startVisualizer();
            switchTab('home');
        }

        function toggle() {
            initAudioAPI();
            if (audio.paused) { audio.play(); updateUI(true); startVisualizer(); }
            else { audio.pause(); updateUI(false); stopVisualizer(); }
        }

        function updateUI(isPlay) {
            const icon = document.getElementById('play-icon');
            icon.setAttribute('data-lucide', isPlay ? 'pause' : 'play');
            lucide.createIcons();
        }

        function setView(mode) {
            currentView = mode;
            document.getElementById('btn-grid').classList.toggle('active', mode === 'grid');
            document.getElementById('btn-list').classList.toggle('active', mode === 'list');
            filterSongs();
        }

        function filterSongs() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = songs.filter(s => s.title.toLowerCase().includes(query));
            renderGrid(filtered);
        }

        function renderGrid(data = songs) {
            const grid = document.getElementById('grid-render');
            grid.className = `grid mode-${currentView}`;
            grid.innerHTML = data.map((s, i) => `
                <div class="card" onclick="playSong(${songs.indexOf(s)})">
                    <img src="${encodeURIComponent(s.img)}" onerror="this.src='https://via.placeholder.com/100/111/9d4edd?text=ER'">
                    <div class="card-info">${s.title}${currentView === 'list' ? `<span>${s.artist}</span>` : ''}</div>
                </div>
            `).join('');
        }

        function togglePanel(p) {
            const lp = document.getElementById('lyrics-panel'), ep = document.getElementById('eq-panel');
            if(p === 'lyrics') { lp.classList.toggle('active'); ep.classList.remove('active'); }
            else { ep.classList.toggle('active'); lp.classList.remove('active'); }
        }

        function next() { index = (index + 1) % songs.length; playSong(index); }
        function prev() { index = (index - 1 + songs.length) % songs.length; playSong(index); }

        audio.ontimeupdate = () => {
            if(audio.duration) {
                const pos = (audio.currentTime / audio.duration) * 100;
                document.getElementById('bar-fill').style.width = pos + "%";
                document.getElementById('time-now').innerText = fmt(audio.currentTime);
                document.getElementById('time-total').innerText = fmt(audio.duration);
            }
        };

        function fmt(s) {
            let m = Math.floor(s/60), sec = Math.floor(s%60);
            return m + ":" + (sec < 10 ? '0' : '') + sec;
        }

        document.getElementById('seek-bar').onclick = (e) => {
            audio.currentTime = (e.offsetX / e.currentTarget.offsetWidth) * audio.duration;
        };

        renderGrid();
        loadSong(0);
        lucide.createIcons();
    </script>
</body>
</html>
