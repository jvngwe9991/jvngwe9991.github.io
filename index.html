<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EWINTH REVENGE | Music</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --accent: #9d4edd;
            --deep: #10002b;
            --bg: #030303;
            --surface: #121212;
            --text: #ffffff;
            --text-dim: #aaaaaa;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* NAVBAR */
        .navbar {
            height: 64px; background: rgba(3, 3, 3, 0.95);
            display: flex; align-items: center; padding: 0 20px;
            border-bottom: 1px solid #222; position: fixed; top: 0; width: 100%; z-index: 1000;
        }
        .nav-logo { font-weight: 900; color: var(--accent); font-size: 20px; margin-right: 40px; }
        .nav-links { display: flex; gap: 25px; }
        .nav-links span { cursor: pointer; color: var(--text-dim); font-size: 14px; font-weight: 600; }
        .nav-links span.active { color: white; border-bottom: 2px solid var(--accent); padding-bottom: 5px; }

        /* CONTENT */
        .content { margin-top: 64px; flex: 1; overflow-y: auto; padding: 30px 5%; background: linear-gradient(to bottom, var(--deep), var(--bg)); }
        .page { display: none; }
        .page.active { display: block; }

        /* LIST STYLE */
        .song-item {
            display: grid; grid-template-columns: 50px 1fr 1fr;
            align-items: center; padding: 12px; border-radius: 8px;
            cursor: pointer; transition: 0.2s;
        }
        .song-item:hover { background: rgba(255,255,255,0.05); }
        .song-item.playing { background: rgba(157, 78, 221, 0.15); color: var(--accent); }
        .song-item img { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; }

        /* GRID STYLE */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
        .card { background: var(--surface); padding: 15px; border-radius: 12px; cursor: pointer; text-align: center; border: 1px solid #222; }
        .card img { width: 100%; aspect-ratio: 1; border-radius: 8px; margin-bottom: 10px; object-fit: cover; }

        /* PLAYER BAR */
        .player {
            height: 90px; background: #000; border-top: 1px solid #222;
            display: flex; align-items: center; padding: 0 20px;
        }
        .p-info { width: 30%; display: flex; align-items: center; gap: 12px; }
        .p-info img { width: 50px; height: 50px; border-radius: 4px; border: 1px solid var(--accent); }
        .p-controls { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .p-btns { display: flex; align-items: center; gap: 20px; margin-bottom: 8px; }
        .btn-play { background: white; color: black; border: none; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .progress-container { width: 100%; max-width: 500px; display: flex; align-items: center; gap: 10px; font-size: 10px; color: var(--text-dim); }
        .bar-bg { flex: 1; height: 4px; background: #333; cursor: pointer; position: relative; border-radius: 2px; }
        .bar-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 2px; }

        .footer { margin-top: 40px; padding: 20px; font-size: 12px; color: #555; border-top: 1px solid #222; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo">EWINTH MUSIC</div>
        <div class="nav-links">
            <span id="tab-home" class="active" onclick="showPage('home')">BERANDA</span>
            <span id="tab-explore" onclick="showPage('explore')">JELAJAHI</span>
        </div>
    </nav>

    <div class="content">
        <div id="page-home" class="page active">
            <h2 style="margin-bottom: 20px;">Lagu Terbaru</h2>
            <div id="list-render"></div>
        </div>

        <div id="page-explore" class="page">
            <h2 style="margin-bottom: 20px;">Jelajahi</h2>
            <div class="grid" id="grid-render"></div>
        </div>

        <div class="footer">
            Powered by <b>Ewinth Revenge</b> | 083862722618
        </div>
    </div>

    <div class="player">
        <div class="p-info">
            <img src="" id="p-img" onerror="this.src='https://via.placeholder.com/50/111/9d4edd?text=ER'">
            <div>
                <div id="p-title" style="font-size: 14px; font-weight: bold; overflow: hidden; white-space: nowrap;">Pilih Lagu</div>
                <div id="p-artist" style="font-size: 11px; color: var(--text-dim);">Ewinth Revenge</div>
            </div>
        </div>
        <div class="p-controls">
            <div class="p-btns">
                <i data-lucide="skip-back" onclick="prev()" style="cursor:pointer"></i>
                <button class="btn-play" onclick="toggle()"><i data-lucide="play" id="play-icon"></i></button>
                <i data-lucide="skip-forward" onclick="next()" style="cursor:pointer"></i>
            </div>
            <div class="progress-container">
                <span id="time-now">0:00</span>
                <div class="bar-bg" id="bar-seek"><div class="bar-fill" id="bar-fill"></div></div>
                <span id="time-total">0:00</span>
            </div>
        </div>
        <div style="width: 30%;"></div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const audio = document.getElementById('audio-player');
        let index = 0;

        // TULIS NAMA FILE PERSIS SEPERTI DI GITHUB
        const songs = [
            {
                title: "Left For Dead",
                artist: "Ewinth Revenge",
                file: "left for dead.mp3",
                img: "left for dead.jpeg"
            },
            {
                title: "Takdir Memisahkan",
                artist: "Ewinth Revenge",
                file: "takdir memisahkan.mp3",
                img: "takdir memisahkan.jpeg"
            }
        ];

        function showPage(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-links span').forEach(el => el.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
            document.getElementById('tab-' + p).classList.add('active');
        }

        function render() {
            // Render Beranda
            document.getElementById('list-render').innerHTML = songs.map((s, i) => `
                <div class="song-item" id="item-${i}" onclick="playSong(${i})">
                    <img src="${encodeURIComponent(s.img)}">
                    <div style="font-weight:600">${s.title}</div>
                    <div style="color:var(--text-dim); font-size:13px">${s.artist}</div>
                </div>
            `).join('');

            // Render Jelajahi
            document.getElementById('grid-render').innerHTML = songs.map((s, i) => `
                <div class="card" onclick="playSong(${i})">
                    <img src="${encodeURIComponent(s.img)}">
                    <div style="font-size:14px; font-weight:bold">${s.title}</div>
                </div>
            `).join('');
        }

        function playSong(i) {
            index = i;
            // Gunakan encodeURIComponent agar spasi terbaca otomatis
            audio.src = encodeURIComponent(songs[i].file);
            document.getElementById('p-title').innerText = songs[i].title;
            document.getElementById('p-img').src = encodeURIComponent(songs[i].img);
            
            audio.play();
            updateIcon(true);
            document.querySelectorAll('.song-item').forEach(el => el.classList.remove('playing'));
            document.getElementById('item-' + i).classList.add('playing');
        }

        function toggle() {
            if (audio.paused) { audio.play(); updateIcon(true); }
            else { audio.pause(); updateIcon(false); }
        }

        function updateIcon(isPlay) {
            const icon = document.getElementById('play-icon');
            icon.setAttribute('data-lucide', isPlay ? 'pause' : 'play');
            lucide.createIcons();
        }

        function next() { index = (index + 1) % songs.length; playSong(index); }
        function prev() { index = (index - 1 + songs.length) % songs.length; playSong(index); }

        audio.ontimeupdate = () => {
            if(audio.duration) {
                const pos = (audio.currentTime / audio.duration) * 100;
                document.getElementById('bar-fill').style.width = pos + "%";
                document.getElementById('time-now').innerText = formatTime(audio.currentTime);
                document.getElementById('time-total').innerText = formatTime(audio.duration);
            }
        };

        function formatTime(s) {
            let m = Math.floor(s/60), sec = Math.floor(s%60);
            return m + ":" + (sec < 10 ? '0' : '') + sec;
        }

        document.getElementById('bar-seek').onclick = (e) => {
            const p = e.offsetX / e.currentTarget.offsetWidth;
            audio.currentTime = p * audio.duration;
        };

        audio.onended = next;

        // Inisialisasi
        render();
        lucide.createIcons();
    </script>
</body>
</html>
