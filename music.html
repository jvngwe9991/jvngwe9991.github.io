<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KS Music Player | 2026</title>
    <script src="https://lucide.dev/icons/lucide.min.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #0d0d0d; --glow: rgba(212, 175, 55, 0.3); }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }

        .player-card { background: var(--card); padding: 35px; border-radius: 20px; border: 1px solid #222; width: 360px; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.9); }
        
        /* Album Art KOTAK SEMPURNA */
        .album-art { width: 280px; height: 280px; border-radius: 12px; margin: 0 auto 25px; overflow: hidden; border: 1px solid #333; transition: 0.5s; position: relative; }
        .album-art img { width: 100%; height: 100%; object-fit: cover; }
        .album-art.playing { box-shadow: 0 0 40px var(--glow); border-color: var(--gold); transform: scale(1.02); }

        .track-info h2 { font-size: 20px; margin: 0; color: var(--gold); font-weight: 900; }
        .track-info p { font-size: 13px; color: #666; margin: 5px 0 25px; text-transform: uppercase; letter-spacing: 2px; }

        /* Progress Bar */
        .progress-area { width: 100%; height: 6px; background: #1a1a1a; border-radius: 10px; margin-bottom: 8px; cursor: pointer; }
        .progress-bar { width: 0%; height: 100%; background: var(--gold); border-radius: 10px; transition: 0.1s linear; }
        .time-info { display: flex; justify-content: space-between; font-size: 10px; color: #444; margin-bottom: 25px; font-weight: 700; }

        /* Controls */
        .controls { display: flex; justify-content: center; align-items: center; gap: 20px; }
        .btn { background: none; border: none; color: #fff; cursor: pointer; transition: 0.3s; }
        .btn:hover { color: var(--gold); }
        .btn-play { background: var(--gold); color: #000; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 15px rgba(0,0,0,0.5); }
        .btn-play:hover { transform: scale(1.1); }

        .footer-brand { font-size: 9px; color: #222; margin-top: 40px; letter-spacing: 2px; font-weight: 800; }
    </style>
</head>
<body>

    <div class="player-card">
        <div class="album-art" id="artBox">
            <img src="" id="coverImg">
        </div>

        <div class="track-info">
            <h2 id="title">Judul Lagu</h2>
            <p id="artist">Nama Artis</p>
        </div>

        <div class="progress-area" id="progressArea">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="time-info">
            <span id="current">0:00</span>
            <span id="total">0:00</span>
        </div>

        <div class="controls">
            <button class="btn" onclick="prevTrack()"><i data-lucide="skip-back"></i></button>
            <button class="btn btn-play" id="playBtn" onclick="togglePlay()"><i data-lucide="play" id="playIcon"></i></button>
            <button class="btn" onclick="nextTrack()"><i data-lucide="skip-forward"></i></button>
        </div>

        <div class="footer-brand">2026 • EWINTH.REVENGE.FOUNDATION</div>
    </div>

    <audio id="mainAudio"></audio>

    <script>
        // --- PENGATURAN LAGU KAMU ---
        const playlist = [
            {
                title: "lef for dead",
                artist: "EWINTH REVENGE",
                cover: "left for dead.jpeg", // Ganti dengan nama file gambar 1
                src: "left for dead.mp3"     // Ganti dengan nama file MP3 1
            },
            {
                title: "takdir memisahkan",
                artist: "EWINTH REVENGE",
                cover: "takdir memisahkan.jpeg", // Ganti dengan nama file gambar 2
                src: "takdir memisahkan.mp3"     // Ganti dengan nama file MP3 2
            }
        ];

        let index = 0;
        const audio = document.getElementById('mainAudio');
        const playIcon = document.getElementById('playIcon');
        const artBox = document.getElementById('artBox');

        // Fungsi Load Lagu
        function loadTrack(i) {
            document.getElementById('title').innerText = playlist[i].title;
            document.getElementById('artist').innerText = playlist[i].artist;
            document.getElementById('coverImg').src = playlist[i].cover;
            audio.src = playlist[i].src;
        }

        // Jalankan saat pertama buka
        loadTrack(index);

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playIcon.setAttribute('data-lucide', 'pause');
                artBox.classList.add('playing');
            } else {
                audio.pause();
                playIcon.setAttribute('data-lucide', 'play');
                artBox.classList.remove('playing');
            }
            lucide.createIcons();
        }

        function nextTrack() {
            index = (index + 1) % playlist.length;
            loadTrack(index);
            audio.play();
            playIcon.setAttribute('data-lucide', 'pause');
            artBox.classList.add('playing');
            lucide.createIcons();
        }

        function prevTrack() {
            index = (index - 1 + playlist.length) % playlist.length;
            loadTrack(index);
            audio.play();
            playIcon.setAttribute('data-lucide', 'pause');
            artBox.classList.add('playing');
            lucide.createIcons();
        }

        // Progress Bar
        audio.ontimeupdate = () => {
            if (audio.duration) {
                const prog = (audio.currentTime / audio.duration) * 100;
                document.getElementById('progressBar').style.width = prog + "%";
                
                let curM = Math.floor(audio.currentTime / 60);
                let curS = Math.floor(audio.currentTime % 60);
                document.getElementById('current').innerText = curM + ":" + (curS < 10 ? "0"+curS : curS);
            }
        };

        audio.onloadedmetadata = () => {
            let durM = Math.floor(audio.duration / 60);
            let durS = Math.floor(audio.duration % 60);
            document.getElementById('total').innerText = durM + ":" + (durS < 10 ? "0"+durS : durS);
        };

        // Auto Next
        audio.onended = () => nextTrack();

        lucide.createIcons();
    </script>
</body>
</html>
